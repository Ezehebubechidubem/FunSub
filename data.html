<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Data</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#ffffff;
      padding:20px;
      color:#111;
    }

    h1{
      color:#000;
      display:flex;
      justify-content:center;
      margin-bottom:40px;
      font-size:28px;
      font-weight:700;
    }

    .container{
      max-width:500px;
      margin:auto;
    }

    .form-box{
      background:#fff;
    }

    label{
      display:block;
      margin-top:20px;
      margin-bottom:8px;
      font-weight:700;
      font-size:15px;
    }

    input,
    select{
      width:100%;
      height:55px;
      border:1px solid #ddd;
      border-radius:14px;
      padding:0 15px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    input:focus,
    select:focus{
      border-color:#D4AF37;
    }

    .network-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      margin-top:10px;
    }

    .network-card{
      border:2px solid #eee;
      border-radius:18px;
      padding:18px;
      cursor:pointer;
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:90px;
      transition:.2s ease;
    }

    .network-card:hover{
      transform:translateY(-1px);
    }

    .network-card img{
      width:46px;
      height:46px;
      object-fit:contain;
    }

    .network-card.active{
      border-color:#D4AF37;
      background:#FFF9E6;
    }

    .buy-btn{
      width:100%;
      height:55px;
      border:none;
      border-radius:15px;
      margin-top:25px;
      background:#D4AF37;
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    .buy-btn:hover{
      opacity:.95;
    }

    .buy-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .transaction-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.65);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
      padding:16px;
    }

    .transaction-card{
      width:95%;
      max-width:430px;
      background:white;
      border-radius:25px;
      padding:25px;
      box-shadow:0 15px 40px rgba(0,0,0,.2);
      animation:pop .2s ease;
    }

    @keyframes pop{
      from{
        transform:scale(.92);
        opacity:.4;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .transaction-icon{
      width:90px;
      height:90px;
      border-radius:50%;
      margin:auto;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:45px;
      background:#FFF8E1;
    }

    .transaction-card h2{
      text-align:center;
      margin-top:15px;
      font-size:22px;
    }

    .transaction-card p{
      text-align:center;
      color:#666;
      margin-top:10px;
      font-size:14px;
      line-height:1.5;
    }

    .receipt-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid #eee;
      font-size:14px;
    }

    .receipt-row span:last-child{
      text-align:right;
      word-break:break-word;
      font-weight:600;
    }

    .close-btn,
    .share-btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
    }

    .close-btn{
      margin-top:14px;
      background:#D4AF37;
      color:white;
    }

    .share-btn{
      margin-top:10px;
      background:#111827;
      color:white;
    }

    .pending{
      background:#FFF8E1;
      color:#8a6d00;
    }

    .success{
      background:#ECFDF3;
      color:#0f7a3b;
    }

    .failed{
      background:#FEE4E2;
      color:#b42318;
    }

    #receiptNetworkBox{
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
    }

    #receiptNetworkLogo{
      width:22px;
      height:22px;
      object-fit:contain;
    }

    @media (max-width:420px){
      .network-card img{
        width:40px;
        height:40px;
      }
    }
  </style>
</head>

<body>
  <h1>Buy Data</h1>

  <div class="container">
    <div class="form-box">
      <label>Phone Number</label>
      <input
        type="tel"
        id="phone"
        maxlength="11"
        placeholder="08012345678"
      >

      <label>Choose Network</label>

      <div class="network-grid">
        <div class="network-card active" data-network="mtn">
          <img src="https://i.postimg.cc/pLyM40v4/idt-V6xz5Md-logos.jpg" alt="MTN">
        </div>

        <div class="network-card" data-network="glo">
          <img src="https://i.postimg.cc/B64Y96DS/glo.png" alt="GLO">
        </div>

        <div class="network-card" data-network="airtel">
          <img src="https://i.postimg.cc/FKZbSxf8/airtel.png" alt="Airtel">
        </div>

        <div class="network-card" data-network="9mobile">
          <img src="https://i.postimg.cc/hhWQ6Jz3/9mobile.png" alt="9mobile">
        </div>
      </div>

      <label>Select Plan</label>
      <select id="planSelect">
        <option value="">Loading plans...</option>
      </select>

      <button id="buyBtn" class="buy-btn">Buy Data</button>
    </div>
  </div>

  <div id="transactionModal" class="transaction-modal">
    <div class="transaction-card">
      <div id="transactionIcon" class="transaction-icon">⏳</div>

      <h2 id="transactionTitle">Processing Transaction</h2>
      <p id="transactionMessage">Please wait...</p>

      <div id="receiptSection" style="display:none; margin-top:18px;">
        <div class="receipt-row">
          <span>Network</span>
          <span id="receiptNetworkBox">
            <img id="receiptNetworkLogo" src="" alt="Network">
            <span id="receiptNetworkName"></span>
          </span>
        </div>

        <div class="receipt-row">
          <span>Reference</span>
          <span id="receiptReference"></span>
        </div>

        <div class="receipt-row">
          <span>Amount</span>
          <span id="receiptAmount"></span>
        </div>

        <div class="receipt-row">
          <span>Description</span>
          <span id="receiptDescription"></span>
        </div>

        <div class="receipt-row">
          <span>Phone</span>
          <span id="receiptPhone"></span>
        </div>

        <div class="receipt-row">
          <span>Status</span>
          <span id="receiptStatus"></span>
        </div>

        <div class="receipt-row">
          <span>Date</span>
          <span id="receiptDate"></span>
        </div>
      </div>

      <button onclick="closeModal()" class="close-btn">Close</button>
      <button onclick="shareReceipt()" class="share-btn">Share</button>
    </div>
  </div>

<script>
  const BASE_URL = "https://funsub.onrender.com/api/services/data/plans";
  const BUY_URL = "https://funsub.onrender.com/api/services/data";

  let currentNetwork = "mtn";
  let currentPlan = null;
  let lastReceipt = null;

  function getToken() {
    return localStorage.getItem("funsub_token") || "";
  }

  function getNetworkMeta(network) {
    const n = String(network || "").trim().toLowerCase();
    const map = {
      mtn: {
        name: "MTN",
        logo: "https://i.postimg.cc/pLyM40v4/idt-V6xz5Md-logos.jpg"
      },
      glo: {
        name: "GLO",
        logo: "https://i.postimg.cc/B64Y96DS/glo.png"
      },
      airtel: {
        name: "Airtel",
        logo: "https://i.postimg.cc/FKZbSxf8/airtel.png"
      },
      "9mobile": {
        name: "9mobile",
        logo: "https://i.postimg.cc/hhWQ6Jz3/9mobile.png"
      }
    };

    return map[n] || { name: n.toUpperCase(), logo: "" };
  }

  function getServiceID(network) {
    return String(network || "").trim().toLowerCase();
  }

  function getNetworkId(network) {
    const n = String(network || "").trim().toLowerCase();
    const map = {
      mtn: 1,
      glo: 2,
      "9mobile": 3,
      airtel: 4
    };
    return map[n] || "";
  }

  function formatNaira(value) {
    const num = Number(value);
    if (Number.isNaN(num)) return "N/A";
    return "₦" + num.toLocaleString("en-NG", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });
  }

  function buildReceiptText() {
    if (!lastReceipt) return "";

    const r = lastReceipt;
    return [
      "FunSub Data Receipt",
      `Network: ${r.networkName || ""}`,
      `Reference: ${r.reference || ""}`,
      `Amount: ${r.amount || ""}`,
      `Description: ${r.description || ""}`,
      `Phone: ${r.phone || ""}`,
      `Status: ${r.status || ""}`,
      `Date: ${r.date || ""}`
    ].join("\n");
  }

  async function shareReceipt() {
    const text = buildReceiptText();
    if (!text) return;

    if (navigator.share) {
      try {
        await navigator.share({
          title: "Data Receipt",
          text
        });
        return;
      } catch (e) {
        console.log(e);
      }
    }

    alert("Sharing is not supported on this browser.");
  }

  document.querySelectorAll(".network-card").forEach(card => {
    card.addEventListener("click", () => {
      document.querySelectorAll(".network-card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      currentNetwork = card.dataset.network;
      loadPlans(currentNetwork);
    });
  });

  const phoneInput = document.getElementById("phone");
  phoneInput.addEventListener("input", function () {
    let value = this.value.replace(/\D/g, "");
    if (value.length > 0 && value.charAt(0) !== "0") {
      value = "";
    }
    value = value.slice(0, 11);
    this.value = value;
  });

  function showProcessingModal() {
    document.getElementById("transactionModal").style.display = "flex";
    document.getElementById("receiptSection").style.display = "none";
    document.getElementById("transactionIcon").className = "transaction-icon";
    document.getElementById("transactionIcon").innerHTML = "⏳";
    document.getElementById("transactionTitle").innerText = "Processing Transaction";
    document.getElementById("transactionMessage").innerText = "Please wait...";
  }

  function showPendingModal(message) {
    document.getElementById("transactionModal").style.display = "flex";
    document.getElementById("receiptSection").style.display = "none";
    document.getElementById("transactionIcon").className = "transaction-icon pending";
    document.getElementById("transactionIcon").innerHTML = "🟡";
    document.getElementById("transactionTitle").innerText = "Transaction Pending";
    document.getElementById("transactionMessage").innerText = message || "Your transaction is pending.";
  }

  function showFailedModal(message) {
    document.getElementById("transactionModal").style.display = "flex";
    document.getElementById("receiptSection").style.display = "none";
    document.getElementById("transactionIcon").className = "transaction-icon failed";
    document.getElementById("transactionIcon").innerHTML = "❌";
    document.getElementById("transactionTitle").innerText = "Transaction Failed";
    document.getElementById("transactionMessage").innerText = message || "Unable to complete transaction.";
  }

  function closeModal() {
    document.getElementById("transactionModal").style.display = "none";
  }

  async function loadPlans(network) {
    const token = getToken();
    const planSelect = document.getElementById("planSelect");

    planSelect.innerHTML = "<option value=\"\">Loading plans...</option>";
    currentPlan = null;

    try {
      const serviceID = getServiceID(network);
      const networkId = getNetworkId(network);

      const response = await fetch(
        `${BASE_URL}?network_id=${encodeURIComponent(networkId)}&network=${encodeURIComponent(network)}&service_id=${encodeURIComponent(serviceID)}&serviceId=${encodeURIComponent(serviceID)}`,
        {
          headers: {
            Authorization: `Bearer ${token}`
          }
        }
      );

      const data = await response.json();
      console.log("PLANS RESPONSE:", data);

      const plans = Array.isArray(data?.plans) ? data.plans : [];

      if (!plans.length) {
        planSelect.innerHTML = "<option value=\"\">No plans found</option>";
        return;
      }

      planSelect.innerHTML = "<option value=\"\">Select a plan</option>";

      plans.forEach(plan => {
        const finalPrice = Number(plan.pricing?.finalPrice ?? plan.rawPrice ?? 0);
        const option = document.createElement("option");

        option.value = plan.id;
        option.textContent = `${plan.name} - ${formatNaira(finalPrice)}`;

        option.dataset.planName = plan.name || "";
        option.dataset.rawPrice = plan.rawPrice ?? "";
        option.dataset.finalPrice = finalPrice;
        option.dataset.source = plan.source || "";
        option.dataset.purchaseRoute = plan.purchase_route || "";
        option.dataset.serviceType = data.serviceType || "data";

        planSelect.appendChild(option);
      });
    } catch (error) {
      console.error(error);
      planSelect.innerHTML = "<option value=\"\">Error loading plans</option>";
    }
  }

  document.getElementById("planSelect").addEventListener("change", function () {
    const selected = this.selectedOptions[0];
    if (!selected || !selected.value) {
      currentPlan = null;
      return;
    }

    currentPlan = {
      id: selected.value,
      name: selected.dataset.planName || selected.textContent,
      rawPrice: selected.dataset.rawPrice || "",
      finalPrice: selected.dataset.finalPrice || "",
      source: selected.dataset.source || "",
      purchaseRoute: selected.dataset.purchaseRoute || "",
      serviceType: selected.dataset.serviceType || "data"
    };
  });

  async function buyData() {
    const token = getToken();

    if (!token) {
      alert("Please login first");
      return;
    }

    const phone = document.getElementById("phone").value.trim();
    const selectedPlan = document.getElementById("planSelect").selectedOptions[0];
    const networkMeta = getNetworkMeta(currentNetwork);

    if (!/^0\d{10}$/.test(phone)) {
      alert("Phone number must start with 0 and contain exactly 11 digits");
      return;
    }

    if (!selectedPlan || !selectedPlan.value) {
      alert("Select a plan");
      return;
    }

    const variation_code = selectedPlan.value;
    const plan_name = selectedPlan.dataset.planName || "";
    const rawPrice = selectedPlan.dataset.rawPrice || "";
    const finalPrice = selectedPlan.dataset.finalPrice || rawPrice || "";
    const source = selectedPlan.dataset.source || "";
    const purchase_route = selectedPlan.dataset.purchaseRoute || "";
    const serviceID = getServiceID(currentNetwork);
    const network_id = getNetworkId(currentNetwork);

    showProcessingModal();

    const buyBtn = document.getElementById("buyBtn");
    buyBtn.disabled = true;
    buyBtn.innerText = "Processing...";

    try {
      const response = await fetch(BUY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
          network: currentNetwork,
          network_id,
          serviceID,
          service_id: serviceID,
          serviceId: serviceID,
          variation_code,
          plan_amount: rawPrice,
          plan_name,
          phone,
          source,
          plan_source: source,
          purchase_route
        })
      });

      const data = await response.json();
      console.log("PURCHASE RESPONSE:", data);

      if (response.ok && data.transaction) {
        const tx = data.providerResponse?.content?.transactions || {};

        document.getElementById("transactionIcon").className = "transaction-icon success";
        document.getElementById("transactionIcon").innerHTML = "✅";
        document.getElementById("transactionTitle").innerText = "Transaction Successful";
        document.getElementById("transactionMessage").innerText = data.message || "Transaction successful";

        document.getElementById("receiptSection").style.display = "block";
        document.getElementById("receiptNetworkLogo").src = networkMeta.logo;
        document.getElementById("receiptNetworkName").innerText = networkMeta.name;

        document.getElementById("receiptReference").innerText = data.transaction.reference || "";
        document.getElementById("receiptAmount").innerText = formatNaira(data.transaction.amount || finalPrice);
        document.getElementById("receiptDescription").innerText = data.transaction.description || plan_name || "Data Purchase";
        document.getElementById("receiptPhone").innerText = tx.unique_element || phone;
        document.getElementById("receiptStatus").innerText = tx.status || "success";
        document.getElementById("receiptDate").innerText = new Date(data.transaction.created_at || Date.now()).toLocaleString();

        lastReceipt = {
          networkName: networkMeta.name,
          reference: data.transaction.reference || "",
          amount: formatNaira(data.transaction.amount || finalPrice),
          description: data.transaction.description || plan_name || "Data Purchase",
          phone: tx.unique_element || phone,
          status: tx.status || "success",
          date: new Date(data.transaction.created_at || Date.now()).toLocaleString()
        };

        return;
      }

      if (
        String(data.status || "").toLowerCase() === "pending" ||
        String(data.transaction?.status || "").toLowerCase() === "pending"
      ) {
        showPendingModal(data.message || "Transaction pending");
        lastReceipt = {
          networkName: networkMeta.name,
          reference: data.transaction?.reference || "",
          amount: formatNaira(rawPrice),
          description: plan_name || "Data Purchase",
          phone,
          status: "pending",
          date: new Date().toLocaleString()
        };
        return;
      }

      showFailedModal(data.message || "Transaction failed");
      lastReceipt = {
        networkName: networkMeta.name,
        reference: data.transaction?.reference || "",
        amount: formatNaira(rawPrice),
        description: plan_name || "Data Purchase",
        phone,
        status: "failed",
        date: new Date().toLocaleString()
      };
    } catch (error) {
      console.error(error);
      showFailedModal("Unable to complete transaction");
      lastReceipt = {
        networkName: networkMeta.name,
        reference: "",
        amount: formatNaira(rawPrice),
        description: plan_name || "Data Purchase",
        phone,
        status: "failed",
        date: new Date().toLocaleString()
      };
    } finally {
      buyBtn.disabled = false;
      buyBtn.innerText = "Buy Data";
    }
  }

  document.getElementById("buyBtn").addEventListener("click", buyData);

  window.addEventListener("DOMContentLoaded", () => {
    loadPlans("mtn");
  });
</script>
</body>
</html>
