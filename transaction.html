<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FunSub | Transactions</title>

  <style>
    :root{
      --gold:#c89a24;
      --gold-soft:rgba(200,154,36,.14);
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --bg:#ffffff;
      --card:#ffffff;
      --surface:#ffffff;
      --input-bg:#ffffff;
      --modal-bg:#ffffff;
      --shadow:0 18px 45px rgba(0,0,0,.08);
      --success:#0f7a3b;
      --danger:#b42318;
      --info:#1d4ed8;
      --pending:#8a6d00;
    }

    body.dark{
      --gold:#c89a24;
      --gold-soft:#2a2310;
      --text:#f3f4f6;
      --muted:#b8c0cc;
      --border:#2b2f38;
      --bg:#0f1115;
      --card:#1a1d24;
      --surface:#1a1d24;
      --input-bg:#232833;
      --modal-bg:#1a1d24;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --success:#34d399;
      --danger:#f87171;
      --info:#60a5fa;
      --pending:#fbbf24;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    .page{
      min-height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 28px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-badge{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(212,175,55,.24), rgba(212,175,55,.08));
      border:1px solid rgba(212,175,55,.35);
      display:grid;
      place-items:center;
      box-shadow:var(--shadow);
      overflow:hidden;
      flex:0 0 48px;
    }

    .brand-badge img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-text h1{
      margin:0;
      font-size:24px;
      letter-spacing:-.03em;
    }

    .brand-text p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }

    .icon-btn{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      padding:14px;
    }

    .summary-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      min-height:92px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
    }

    .summary-card .big{font-size:26px;font-weight:800;line-height:1}
    .summary-card .small{font-size:12px;color:var(--muted)}
    .summary-card.success .big{color:var(--success)}
    .summary-card.pending .big{color:var(--pending)}
    .summary-card.failed .big{color:var(--danger)}
    .summary-card.reversed .big{color:var(--info)}

    .controls{
      display:grid;
      grid-template-columns:1.4fr .9fr .9fr;
      gap:12px;
      padding:0 14px 14px;
    }

    .search-wrap,
    .select-wrap{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      height:48px;
    }

    .search-wrap input,
    .select-wrap select{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }

    .search-wrap input::placeholder{color:var(--muted)}
    .select-wrap select{appearance:none;cursor:pointer}

    .list-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:0 14px 14px;
    }

    .list-head h2{
      margin:0;
      font-size:18px;
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:0 14px 14px;
    }

    .pill{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
    }

    .pill.active{
      background:var(--gold-soft);
      border-color:rgba(200,154,36,.45);
      color:var(--gold);
      font-weight:700;
    }

    .transactions{
      padding:0 14px 14px;
      display:grid;
      gap:10px;
    }

    .tx-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      transition:transform .15s ease, border-color .15s ease, background .15s ease;
      min-width:0;
    }

    .tx-card:hover{
      transform:translateY(-1px);
      border-color:rgba(200,154,36,.35);
    }

    .tx-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
    }

    .tx-logo{
      width:48px;
      height:48px;
      border-radius:15px;
      background:#fff;
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 48px;
      border:1px solid rgba(0,0,0,.06);
    }

    .tx-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .tx-meta{min-width:0; flex:1 1 auto;}
    .tx-title{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin:0 0 4px;
    }

    .tx-sub{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
      overflow:hidden;
    }

    .tx-sub span{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .tx-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:6px;
      flex:0 0 auto;
      min-width:92px;
      margin-left:auto;
    }

    .tx-amount{
      font-size:16px;
      font-weight:800;
      text-align:right;
      white-space:nowrap;
    }

    .status-chip{
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
      text-transform:capitalize;
      white-space:nowrap;
    }

    .status-success{background:rgba(34,197,94,.12);color:var(--success);border-color:rgba(34,197,94,.25)}
    .status-pending{background:rgba(245,158,11,.12);color:var(--pending);border-color:rgba(245,158,11,.25)}
    .status-failed{background:rgba(239,68,68,.12);color:var(--danger);border-color:rgba(239,68,68,.25)}
    .status-reversed{background:rgba(59,130,246,.12);color:var(--info);border-color:rgba(59,130,246,.25)}

    .empty,
    .error-state,
    .loading{
      padding:40px 18px;
      text-align:center;
      color:var(--muted);
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:20px;
      margin:0 14px 14px;
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
      backdrop-filter:blur(7px);
    }

    .modal-close-btn{
      position:absolute;
      top:18px;
      right:18px;
      width:42px;
      height:42px;
      border-radius:50%;
      border:0;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:22px;
      cursor:pointer;
      z-index:10000;
      display:grid;
      place-items:center;
    }

    .receipt-shell{
      width:min(92vw, 392px);
      max-height:min(86vh, 860px);
      overflow:visible;
      border-radius:28px;
      background:transparent;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      position:relative;
    }

    .receipt-card{
      background:linear-gradient(180deg, #0b0b0d 0 34%, #f7f7f7 34% 100%);
      color:var(--text);
      border-radius:28px;
      overflow:hidden;
      position:relative;
      border:1px solid rgba(200,154,36,.55);
    }
.receipt-header{
      background:linear-gradient(180deg, #0b0b0d 0%, #121214 100%);
      color:#fff;
      padding:12px 12px 24px;
      text-align:center;
      position:relative;
    }

    .receipt-header::after{
      content:"";
      position:absolute;
      left:-4%;
      right:-4%;
      bottom:-15px;
      height:32px;
      background:#f7f7f7;
      border-top-left-radius:50% 100%;
      border-top-right-radius:50% 100%;
      border-bottom:3px solid var(--gold);
      box-sizing:border-box;
    }

    .receipt-logo-wrap{
      width:54px;
      height:54px;
      border-radius:50%;
      margin:0 auto 8px;
      background:rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      overflow:hidden;
      border:1px solid rgba(200,154,36,.35);
    }

    .receipt-logo-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .receipt-brand{
      margin:0;
      font-size:19px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1;
    }

    .receipt-brand .gold{color:var(--gold)}

    .receipt-subtitle{
      margin:3px 0 0;
      font-size:12px;
      color:#e5e7eb;
      opacity:.92;
    }

    .receipt-body{
      padding:10px 10px 12px;
      margin-top:4px;
    }

    .amount-card{
      background:linear-gradient(180deg, #fffaf0, #fffdf8);
      border:1px solid rgba(200,154,36,.28);
      border-radius:22px;
      padding:11px 9px;
      text-align:center;
      margin-bottom:9px;
    }

    .amount-card .label{
      font-size:13px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .amount-card .amount{
      font-size:26px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.05em;
      color:#111827;
      white-space:nowrap;
    }

    .detail-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:8px 9px;
      box-shadow:0 10px 28px rgba(17,24,39,.04);
    }

    .detail-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:8px 0;
      border-bottom:1px dashed #e5e7eb;
      font-size:12px;
      line-height:1.2;
    }

    .detail-row:last-child{border-bottom:0}

    .detail-label{
      color:#4b5563;
      min-width:84px;
      flex:0 0 auto;
    }

    .detail-value{
      font-weight:700;
      color:#111827;
      text-align:right;
      word-break:break-word;
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      min-width:0;
    }

    .detail-text{
      min-width:0;
      flex:1 1 auto;
    }

    .mini-copy-btn{
      width:22px;
      height:22px;
      border:0;
      border-radius:7px;
      background:rgba(200,154,36,.12);
      color:var(--gold);
      font-size:13px;
      line-height:1;
      cursor:pointer;
      display:grid;
      place-items:center;
      flex:0 0 22px;
      padding:0;
    }

    .provider-mini{
      display:inline-flex;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
      vertical-align:middle;
      min-width:0;
      max-width:100%;
    }

    .provider-mini img{
      width:30px;
      height:30px;
      object-fit:cover;
      border-radius:8px;
      border:1px solid rgba(0,0,0,.05);
      background:#fff;
      flex:0 0 30px;
    }

    .provider-mini span{
      display:inline-block;
      max-width:120px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status-inline{
      font-weight:800;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .status-inline::before{
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      display:inline-block;
      background:currentColor;
    }
    .status-inline.success{color:var(--success)}
    .status-inline.pending{color:var(--pending)}
    .status-inline.reversed{color:var(--info)}
    .status-inline.failed{color:var(--danger)}

    .button-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:9px;
      margin-top:9px;
    }

    .receipt-btn{
      height:44px;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .receipt-btn.dark{background:#0b0b0d;color:#fff}
    .receipt-btn.gold{background:var(--gold);color:#111}
    .receipt-btn.light{background:#f3f4f6;color:#111827;border:1px solid #e5e7eb}

    .receipt-footer{
      text-align:center;
      color:#6b7280;
      padding:10px 8px 0;
      font-size:11px;
      line-height:1.35;
    }

    .receipt-footer strong{
      display:block;
      color:#0f172a;
      margin-top:4px;
    }

    .receipt-footer .gold{
      color:var(--gold);
      font-weight:700;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      visibility:hidden;
      background:rgba(17,24,39,.96);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 16px;
      z-index:10000;
      box-shadow:var(--shadow);
      transition:.25s ease;
      font-size:14px;
      max-width:min(92vw, 480px);
      text-align:center;
    }

    .toast.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    @media print{
      body{background:#fff !important}
      body *{visibility:hidden !important}
      .receipt-shell, .receipt-shell *{visibility:visible !important}
      .modal-overlay{position:static;background:#fff;display:block !important;padding:0}
      .receipt-shell{max-height:none;width:100%;box-shadow:none}
      .receipt-card{border-radius:0}
      .topbar,.summary-grid,.controls,.pill-row,.transactions,.toast{display:none !important}
      .modal-close-btn{display:none !important}
    }

    @media (max-width: 900px){
      .summary-grid{grid-template-columns:repeat(2,1fr)}
      .controls{grid-template-columns:1fr}
    }

    @media (max-width: 520px){
      .page{padding:14px 12px 20px}
      .brand-text h1{font-size:22px}
      .summary-grid{padding:12px;gap:10px}
      .summary-card{min-height:84px}
      .tx-card{padding:12px}
      .tx-title{font-size:14px}
      .tx-right{min-width:84px}
      .receipt-shell{width:min(92vw, 384px)}
      .receipt-header{padding:12px 11px 22px}
      .receipt-header::after{height:28px;bottom:-13px}
      .receipt-logo-wrap{width:50px;height:50px}
      .receipt-brand{font-size:18px}
      .receipt-subtitle{font-size:11px}
      .receipt-body{padding:9px 9px 11px}
      .amount-card{padding:10px 8px;margin-bottom:8px}
      .amount-card .amount{font-size:24px}
      .detail-card{padding:7px 8px}
      .detail-row{padding:7px 0;font-size:11px;gap:8px}
      .detail-label{min-width:78px}
      .provider-mini span{max-width:96px}
      .button-grid{gap:8px;margin-top:8px}
      .receipt-btn{height:41px;font-size:12px}
      .receipt-footer{padding-top:9px;font-size:10px}
      .modal-close-btn{top:12px;right:12px;width:38px;height:38px;font-size:20px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge" title="FunSub logo">
          <img id="appLogo" src="./icons/funsub-logo.png" alt="FunSub Logo"
               onerror="this.style.display='none'; this.parentElement.textContent='FS'; this.parentElement.style.color='var(--gold)'; this.parentElement.style.fontWeight='900'; this.parentElement.style.fontSize='20px';" />
        </div>
        <div class="brand-text">
          <h1>Transactions</h1>
          <p>Tap any item to open the receipt</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">⟳</button>
      </div>
    </div>

    <div class="panel">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="big" id="sumAll">0</div>
          <div class="small">All Transactions</div>
        </div>
        <div class="summary-card success">
          <div class="big" id="sumSuccess">0</div>
          <div class="small">Successful</div>
        </div>
        <div class="summary-card pending">
          <div class="big" id="sumPending">0</div>
          <div class="small">Pending</div>
        </div>
        <div class="summary-card failed">
          <div class="big" id="sumFailed">0</div>
          <div class="small">Failed / Reversed</div>
        </div>
      </div>

      <div class="controls">
        <div class="search-wrap">
          <span style="color:var(--muted)">⌕</span>
          <input id="searchInput" type="search" placeholder="Search by service, reference, amount..." />
        </div>
        <div class="select-wrap">
          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="success">Successful</option>
            <option value="pending">Pending</option>
            <option value="failed">Failed</option>
            <option value="reversed">Reversed</option>
          </select>
        </div>
        <div class="select-wrap">
          <select id="serviceFilter">
            <option value="all">All Services</option>
            <option value="airtime">Airtime</option>
            <option value="data">Data</option>
            <option value="cable_tv">Cable TV</option>
            <option value="electricity">Electricity</option>
            <option value="betting">Betting</option>
            <option value="wallet">Wallet</option>
            <option value="recharge_pin">Recharge PIN</option>
            <option value="data_pin">Data PIN</option>
            <option value="exam_pin">Exam PIN</option>
          </select>
        </div>
      </div>

      <div class="list-head">
        <h2>Your Transaction History</h2>
        <div style="color:var(--muted);font-size:13px" id="countLabel">0 items</div>
      </div>

      <div class="pill-row" id="quickPills">
        <button class="pill active" data-preset="all" type="button">All</button>
        <button class="pill" data-preset="today" type="button">Today</button>
        <button class="pill" data-preset="week" type="button">7 Days</button>
        <button class="pill" data-preset="month" type="button">30 Days</button>
      </div>

      <div id="loadingState" class="loading">Loading transactions...</div>
      <div id="emptyState" class="empty" style="display:none;">No transactions yet.</div>
      <div id="errorState" class="error-state" style="display:none;"></div>
      <div id="transactionsList" class="transactions"></div>
    </div>
  </div>

  <div class="modal-overlay" id="receiptModal" aria-hidden="true">
    <button class="modal-close-btn" id="closeReceiptBtn" type="button" aria-label="Close receipt">×</button>

    <div class="receipt-shell">
      <div class="receipt-card" id="receiptCard">
        <div class="receipt-header">
          <div class="receipt-logo-wrap">
            <img id="receiptLogo" src="./icons/funsub-logo.png" alt="FunSub Logo"
                 onerror="this.style.display='none'; this.parentElement.textContent='FS'; this.parentElement.style.color='var(--gold)'; this.parentElement.style.fontWeight='900'; this.parentElement.style.fontSize='20px';" />
          </div>
          <h3 class="receipt-brand"><span class="gold">Fun</span>Sub</h3>
          <div class="receipt-subtitle">Transaction Receipt</div>
        </div>

        <div class="receipt-body">
          <div class="amount-card">
            <div class="label">Amount</div>
            <div class="amount" id="receiptAmountBig">₦0.00</div>
          </div>

          <div class="detail-card" id="receiptDetails"></div>

          <div class="button-grid">
            <button class="receipt-btn dark" id="copyBtn" type="button">
              <span>⧉</span> Copy ID
            </button>
            <button class="receipt-btn gold" id="shareBtn" type="button">
              <span>↗</span> Share Image
            </button>
            <button class="receipt-btn dark" id="downloadBtn" type="button">
              <span>⌘</span> Download PDF
            </button>
            <button class="receipt-btn dark" id="saveBtn" type="button">
              <span>▣</span> Save Image
            </button>
          </div>

          <div class="receipt-footer">
            Thank you for using our service!
            <strong><span class="gold">Powered by FunSub</span></strong>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script src="theme.js" defer></script>

          <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
const API_ROOT = 'https://funsub.onrender.com';
    const tokenKey = 'funsub_token';

    const transactionsList = document.getElementById('transactionsList');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const errorState = document.getElementById('errorState');
    const countLabel = document.getElementById('countLabel');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const serviceFilter = document.getElementById('serviceFilter');
    const refreshBtn = document.getElementById('refreshBtn');
    const quickPills = document.getElementById('quickPills');

    const receiptModal = document.getElementById('receiptModal');
    const closeReceiptBtn = document.getElementById('closeReceiptBtn');
    const receiptAmountBig = document.getElementById('receiptAmountBig');
    const receiptDetails = document.getElementById('receiptDetails');
    const copyBtn = document.getElementById('copyBtn');
    const shareBtn = document.getElementById('shareBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const saveBtn = document.getElementById('saveBtn');
    const toast = document.getElementById('toast');

    const providerLogos = {
      mtn: 'https://i.postimg.cc/pLyM40v4/idt-V6xz5Md-logos.jpg',
      airtel: 'https://i.postimg.cc/FKZbSxf8/airtel.png',
      glo: 'https://i.postimg.cc/B64Y96DS/glo.png',
      '9mobile': 'https://i.postimg.cc/hhWQ6Jz3/9mobile.png',
      dstv: 'https://i.postimg.cc/2S9tQkK3/dstv.png',
      gotv: 'https://i.postimg.cc/rwYj7Y8Z/gotv.png',
      startimes: 'https://i.postimg.cc/0j3mHf9P/startimes.png',
      showmax: 'https://i.postimg.cc/0Q2pWv5Y/showmax.png',
      bet9ja: 'https://i.postimg.cc/g2YWYTTF/IMG-20260704-153103.jpg',
      '1xbet': 'https://i.postimg.cc/MKq4Rjbz/IMG-20260704-153140.jpg',
      bangbet: 'https://i.postimg.cc/Y2RjKZRS/IMG-20260704-160404.jpg',
      betking: 'https://i.postimg.cc/V6XG0YJ4/IMG-20260704-153020.jpg',
      betland: 'https://i.postimg.cc/fytPK6TK/IMG-20260704-160941.jpg',
      betlion: 'https://i.postimg.cc/NGC92ZHC/IMG-20260704-161648.jpg',
      betway: 'https://i.postimg.cc/qqM5PP7Q/IMG-20260704-155102.jpg',
      cloudbet: 'https://i.postimg.cc/xyz/cloudbet.png',
      livescorebet: 'https://i.postimg.cc/xyz/livescore.png',
      merrybet: 'https://i.postimg.cc/xyz/merrybet.png',
      naijabet: 'https://i.postimg.cc/xyz/naijabet.png',
      nairabet: 'https://i.postimg.cc/xyz/nairabet.png',
      supabet: 'https://i.postimg.cc/J7GSMBch/IMG-20260704-155654.jpg',
      flutterwave: ''
    };

    const state = {
      all: [],
      filtered: [],
      selected: null,
      preset: 'all'
    };

    function getToken() {
      return localStorage.getItem(tokenKey) || '';
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    async function copyTextToClipboard(text, okMessage = 'Copied') {
      const value = String(text || '').trim();
      if (!value) return;
      try {
        await navigator.clipboard.writeText(value);
        showToast(okMessage);
      } catch {
        showToast('Unable to copy');
      }
    }

    function normalizeStatus(value) {
      return String(value || '').trim().toLowerCase().replace(/[\s/]+/g, '-');
    }

    function safeJsonParse(meta) {
      if (!meta) return {};
      if (typeof meta === 'object' && !Array.isArray(meta)) return meta;
      if (typeof meta !== 'string') return {};
      try {
        const parsed = JSON.parse(meta);
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return { rawMeta: meta };
      }
    }

    function getNested(obj, path, fallback = '') {
      try {
        return path.split('.').reduce((acc, key) => acc?.[key], obj) ?? fallback;
      } catch {
        return fallback;
      }
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return '₦' + num.toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatDateTime(value) {
      const dt = value ? new Date(value) : new Date();
      if (Number.isNaN(dt.getTime())) return { date: '—', time: '—' };
      const date = dt.toLocaleDateString('en-NG', { day: '2-digit', month: 'short', year: 'numeric' });
      const time = dt.toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit' });
      return { date, time };
    }

    function prettyName(value) {
      const v = String(value || '').trim();
      if (!v) return '';
      const key = v.toLowerCase();
      const map = {
        mtn: 'MTN', airtel: 'Airtel', glo: 'GLO', '9mobile': '9mobile',
        dstv: 'DStv', gotv: 'GOtv', startimes: 'Startimes', showmax: 'Showmax',
        bet9ja: 'Bet9ja', '1xbet': '1xBet', bangbet: 'BangBet', betking: 'BetKing',
        betland: 'BetLand', betlion: 'BetLion', betway: 'BetWay', cloudbet: 'CloudBet',
        livescorebet: 'LiveScoreBet', merrybet: 'MerryBet', naijabet: 'NaijaBet',
        nairabet: 'NairaBet', supabet: 'SupaBet', flutterwave: 'Flutterwave'
      };
      return map[key] || v;
    }

    function getMeta(tx) {
      return safeJsonParse(tx?.meta);
    }

    function getCategory(tx) {
      const meta = getMeta(tx);
      return normalizeStatus(tx?.category || tx?.type || meta?.serviceType || meta?.category);
    }

    function getActorInfo(tx) {
      const meta = getMeta(tx);
      const category = getCategory(tx);
      const networkMode = ['airtime', 'data', 'recharge_pin', 'data_pin'].includes(category);

      let raw = '';

      if (category === 'airtime') {
        raw =
          getNested(meta, 'providerResponse.data.service_name') ||
          getNested(meta, 'providerResponse.data.network') ||
          meta.network ||
          meta.networkName ||
          getNested(meta, 'selectedPlan.meta.network') ||
          meta.service_id ||
          meta.providerLabel ||
          '';
      } else if (category === 'data') {
        raw =
          getNested(meta, 'providerResponse.data.network') ||
          meta.network ||
          meta.networkName ||
          getNested(meta, 'selectedPlan.meta.network') ||
          meta.service_id ||
          meta.providerLabel ||
          '';
      } else if (category === 'wallet') {
        raw = meta.gateway || meta.provider || 'Flutterwave';
      } else {
        raw = meta.providerLabel || meta.service_id || meta.provider || tx?.provider || '';
      }

      if (normalizeStatus(raw) === 'iacafe') {
        raw = networkMode
          ? (
              getNested(meta, 'providerResponse.data.service_name') ||
              getNested(meta, 'providerResponse.data.network') ||
              meta.network ||
              meta.networkName ||
              getNested(meta, 'selectedPlan.meta.network') ||
              meta.service_id ||
              meta.providerLabel ||
              ''
            )
          : (meta.providerLabel || meta.service_id || tx?.provider || '');
      }

      const label = prettyName(raw || (networkMode ? 'Network' : 'Provider'));
      const key = normalizeStatus(raw || label);
      const logo = providerLogos[key] || providerLogos[normalizeStatus(label)] || '';
      return { label, logo, isNetwork: networkMode };
    }

    function getServiceLabel(tx) {
      const meta = getMeta(tx);
      const category = getCategory(tx);
      if (meta.serviceName) return prettyName(meta.serviceName);

      const map = {
        airtime: 'Airtime',
        data: 'Data',
        cable_tv: 'Cable TV',
        cable: 'Cable TV',
        betting: 'Betting',
        electricity: 'Electricity',
        wallet: 'Wallet',
        recharge_pin: 'Recharge PIN',
        data_pin: 'Data PIN',
        exam_pin: 'Exam PIN'
      };

      return map[category] || prettyName(tx?.description || 'Transaction');
    }

    function getTitle(tx) {
      const category = getCategory(tx);
      if (category === 'airtime') return 'Airtime Subscription';
      if (category === 'data') return 'Data Subscription';
      if (category === 'cable_tv' || category === 'cable') return 'Cable TV Subscription';
      if (category === 'betting') return 'Bet Funding';
      if (category === 'electricity') return 'Electricity Payment';
      if (category === 'wallet') return 'Wallet Funding';
      if (category === 'recharge_pin') return 'Recharge PIN';
      if (category === 'data_pin') return 'Data PIN';
      if (category === 'exam_pin') return 'Exam PIN';
      return tx?.description || getMeta(tx)?.description || getMeta(tx)?.request_id || getMeta(tx)?.requestId || 'Transaction';
    }

    function getStatusLabel(tx) {
      const s = normalizeStatus(tx?.status || tx?.meta?.status || '');
      if (['success','successful','completed','completed-api','complete','paid','ok'].includes(s)) return 'successful';
      if (['pending','processing','queued','unknown','submitted'].includes(s)) return 'pending';
      if (['reversed','refund','refunded','reversed-api'].includes(s) || s.includes('timeout')) return 'reversed';
      return 'failed';
    }

    function statusClass(tx) {
      return `status-${getStatusLabel(tx)}`;
    }

    function statusText(tx) {
      const s = getStatusLabel(tx);
      if (s === 'successful') return 'Successful';
      if (s === 'pending') return 'Pending';
      if (s === 'reversed') return 'Reversed';
      return 'Failed';
    }

    function isWithinPreset(tx, preset) {
      if (preset === 'all') return true;
      const dt = new Date(tx.created_at || tx.updated_at || Date.now());
      if (Number.isNaN(dt.getTime())) return true;
      const now = new Date();
      const diff = now.getTime() - dt.getTime();
      const oneDay = 24 * 60 * 60 * 1000;
      if (preset === 'today') return dt.toDateString() === now.toDateString();
      if (preset === 'week') return diff <= 7 * oneDay;
      if (preset === 'month') return diff <= 30 * oneDay;
      return true;
    }

    function matchesFilters(tx) {
      const q = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const service = serviceFilter.value;
      const preset = state.preset;

      if (!isWithinPreset(tx, preset)) return false;
      if (status !== 'all' && getStatusLabel(tx) !== status) return false;
      if (service !== 'all' && getCategory(tx) !== service) return false;
      if (!q) return true;

      const meta = getMeta(tx);
      const haystack = [
        tx?.id, tx?.reference, tx?.description, tx?.amount, tx?.status, tx?.category,
        meta.request_id, meta.requestId, meta.customer_id, meta.customerId,
        meta.phone, meta.phone_number, meta.customer_number, meta.smartcard_number,
        meta.meter_number, meta.account_number, meta.service_id, meta.serviceId,
        meta.provider, meta.providerLabel, meta.gateway, meta.network, meta.network_name,
        meta.networkName, meta.plan_name, meta.packageName, meta.package_name,
        meta.customer_name, meta.customerName,
        getNested(meta, 'providerResponse.data.phone'),
        getNested(meta, 'providerResponse.data.network'),
        getNested(meta, 'providerResponse.data.service_name'),
        getNested(meta, 'flutterwaveData.customer.phone_number'),
        getNested(meta, 'flutterwaveData.customer.name'),
        getNested(meta, 'virtualAccount.account_number')
      ].filter(Boolean).join(' ').toLowerCase();

      return haystack.includes(q);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function detailItem(label, value, { logo = '', text = '', copyValue = '' } = {}) {
      const logoHtml = logo || text ? `
        <span class="provider-mini">
          ${logo ? `<img src="${logo}" alt="${escapeHtml(text || label)}">` : ''}
          ${text ? `<span>${escapeHtml(text)}</span>` : ''}
        </span>` : '';

      const copyHtml = copyValue
        ? `<button class="mini-copy-btn" type="button" data-copy="${escapeHtml(String(copyValue))}" aria-label="Copy ${escapeHtml(label)}">⧉</button>`
        : '';

      const valueHtml = logoHtml
        ? logoHtml
        : `<span class="detail-text">${escapeHtml(value)}</span>${copyHtml}`;

      return `
        <div class="detail-row">
          <div class="detail-label">${escapeHtml(label)}</div>
          <div class="detail-value">${valueHtml}</div>
        </div>
      `;
    }

    function renderTransactions() {
      const filtered = state.all.filter(matchesFilters);
      state.filtered = filtered;
      transactionsList.innerHTML = '';
      countLabel.textContent = `${filtered.length} item${filtered.length === 1 ? '' : 's'}`;
      document.getElementById('sumAll').textContent = state.all.length;
      document.getElementById('sumSuccess').textContent = state.all.filter(tx => getStatusLabel(tx) === 'successful').length;
      document.getElementById('sumPending').textContent = state.all.filter(tx => getStatusLabel(tx) === 'pending').length;
      document.getElementById('sumFailed').textContent = state.all.filter(tx => ['failed', 'reversed'].includes(getStatusLabel(tx))).length;

      loadingState.style.display = 'none';
      errorState.style.display = 'none';
      emptyState.style.display = filtered.length ? 'none' : 'block';

      if (!filtered.length) return;

      for (const tx of filtered) {
        const meta = getMeta(tx);
        const actor = getActorInfo(tx);
        const { date, time } = formatDateTime(tx.created_at || tx.updated_at);
        const amount = formatMoney(tx.amount);
        const title = getTitle(tx);
        const serviceLabel = getServiceLabel(tx);

        const card = document.createElement('div');
        card.className = 'tx-card';
        card.innerHTML = `
          <div class="tx-left">
            <div class="tx-logo">
              ${actor.logo ? `<img src="${actor.logo}" alt="${escapeHtml(actor.label)}">` : `<span style="font-weight:900;color:var(--gold)">${escapeHtml((actor.label || 'TX').slice(0,2).toUpperCase())}</span>`}
            </div>
            <div class="tx-meta">
              <div class="tx-title">${escapeHtml(title)}</div>
              <div class="tx-sub">
                <span>${escapeHtml(serviceLabel)}</span>
                <span>•</span>
                <span>${escapeHtml(tx.reference || meta.request_id || meta.requestId || tx.id || '—')}</span>
                <span>•</span>
                <span>${escapeHtml(date)} ${escapeHtml(time)}</span>
              </div>
            </div>
          </div>
          <div class="tx-right">
            <div class="status-chip ${statusClass(tx)}">${statusText(tx)}</div>
            <div class="tx-amount">${amount}</div>
          </div>
        `;

        card.addEventListener('click', () => openReceipt(tx));
        transactionsList.appendChild(card);
      }
    }

    function buildReceiptDetails(tx) {
      const meta = getMeta(tx);
      const category = getCategory(tx);
      const actor = getActorInfo(tx);
      const { date, time } = formatDateTime(tx.created_at || tx.updated_at);
      const status = statusText(tx);
      const statusKey = getStatusLabel(tx);
      const rows = [];

      const requestId = meta.request_id || meta.requestId || tx.reference || tx.id || '—';
      const ref = tx.reference || meta.reference || requestId;
      const fee = meta.fee_amount ?? meta.fee ?? 0;
      const before = meta.balance_before ?? meta.balanceBefore;
      const after = meta.balance_after ?? meta.balanceAfter;
      const txId = tx.id || meta.transactionId || '—';

      rows.push(detailItem('Transaction ID', txId, { copyValue: txId }));
      rows.push(detailItem('Request ID', requestId, { copyValue: requestId }));
      rows.push(detailItem(actor.isNetwork ? 'Network' : 'Provider', '', { logo: actor.logo, text: actor.label }));

      if (category === 'airtime' || category === 'data' || category === 'recharge_pin' || category === 'data_pin') {
        const phone =
          getNested(meta, 'providerResponse.data.phone') ||
          getNested(meta, 'flutterwaveData.customer.phone_number') ||
          meta.phone ||
          meta.phone_number ||
          meta.customer_number ||
          meta.customer_id ||
          meta.customerId ||
          '—';
        rows.push(detailItem('Phone Number', phone));
      }

      if (category === 'cable_tv' || category === 'cable') {
        rows.push(detailItem('Customer Name', meta.customer_name || meta.customerName || '—'));
        rows.push(detailItem('Smartcard / IUC', meta.customer_id || meta.smartcard_number || meta.account_number || '—'));
        rows.push(detailItem('Package', meta.packageDisplay || meta.packageName || meta.plan_name || '—'));
        rows.push(detailItem('Subscription', (meta.subscription_type_label || meta.subscription_type || 'renew').replace(/_/g, ' ')));
      }

      if (category === 'betting') {
        rows.push(detailItem('Provider', meta.providerLabel || meta.service_id || '—'));
        rows.push(detailItem('Betting ID', meta.customer_id || meta.customerId || '—'));
      }

      if (category === 'electricity') {
        rows.push(detailItem('Customer Name', meta.customer_name || meta.customerName || '—'));
        rows.push(detailItem('Meter Number', meta.meter_number || meta.meterNumber || meta.customer_id || '—'));
        if (meta.token) rows.push(detailItem('Token', meta.token));
      }

      if (category === 'wallet') {
        rows.push(detailItem('Payment Method', prettyName(meta.gateway || meta.provider || 'Flutterwave')));
        const phone = getNested(meta, 'flutterwaveData.customer.phone_number') || '—';
        rows.push(detailItem('Phone Number', phone));
      }

      if (before !== undefined && after !== undefined) {
        rows.push(detailItem('Balance Before', formatMoney(before)));
        rows.push(detailItem('Balance After', formatMoney(after)));
      }

      rows.push(detailItem('Amount', formatMoney(tx.amount)));
      if (fee !== undefined && Number(fee) > 0) rows.push(detailItem('Fee', formatMoney(fee)));
      rows.push(detailItem('Status', status, { copyValue: statusKey, text: status }));
      rows.push(detailItem('Date', date));
      rows.push(detailItem('Time', time));
      rows.push(detailItem('Reference', ref));

      if (tx.description) rows.push(detailItem('Description', tx.description));

      return rows.join('');
    }

    function openReceipt(tx) {
      state.selected = tx;
      receiptAmountBig.textContent = formatMoney(tx.amount);
      receiptDetails.innerHTML = buildReceiptDetails(tx);
      receiptModal.style.display = 'flex';
      receiptModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeReceipt() {
      receiptModal.style.display = 'none';
      receiptModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    async function copySelectedId() {
      const tx = state.selected;
      if (!tx) return;
      const meta = getMeta(tx);
      const value = tx.id || meta.transactionId || tx.reference || meta.request_id || meta.requestId || '';
      await copyTextToClipboard(value, 'Transaction ID copied');
    }

    async function captureReceiptCanvas() {
      const node = document.getElementById('receiptCard');
      if (!node || typeof html2canvas !== 'function') throw new Error('Image capture is not available');
      return await html2canvas(node, { scale: 2, backgroundColor: null, useCORS: true, allowTaint: true });
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), 'image/png', 1);
      });
    }

    async function shareReceiptImage() {
      const tx = state.selected;
      if (!tx) return;

      try {
        const canvas = await captureReceiptCanvas();
        const blob = await canvasToBlob(canvas);
        if (!blob) throw new Error('Unable to create image');

        const fileName = `funsub-receipt-${String(tx.reference || tx.id || 'tx').replace(/[^a-z0-9_-]/gi, '_')}.png`;
        const file = new File([blob], fileName, { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: 'FunSub Receipt',
            text: 'FunSub Transaction Receipt',
            files: [file]
          });
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      } catch (err) {
        console.error(err);
        showToast('Unable to share image');
      }
    }

    async function downloadReceiptImage() {
      const tx = state.selected;
      if (!tx) return;

      try {
        const canvas = await captureReceiptCanvas();
        const blob = await canvasToBlob(canvas);
        if (!blob) throw new Error('Unable to create image');

        const fileName = `funsub-receipt-${String(tx.reference || tx.id || 'tx').replace(/[^a-z0-9_-]/gi, '_')}.png`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      } catch (err) {
        console.error(err);
        showToast('Unable to download image');
      }
    }

    function saveReceiptImage() {
      downloadReceiptImage();
    }

    async function loadDashboardData() {
      const token = getToken();
      if (!token) {
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
        errorState.textContent = 'Please log in to view your transactions.';
        return;
      }

      loadingState.style.display = 'block';
      errorState.style.display = 'none';
      emptyState.style.display = 'none';
      transactionsList.innerHTML = '';

      try {
        const res = await fetch(`${API_ROOT}/api/wallet/transactions?limit=100`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = { rawResponse: text };
        }

        if (!res.ok) throw new Error(data.message || 'Unable to load transactions');

        state.all = Array.isArray(data.transactions)
          ? data.transactions
          : Array.isArray(data?.data?.transactions)
            ? data.data.transactions
            : [];

        renderTransactions();
      } catch (err) {
        console.error('Transactions load error:', err);
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
        errorState.textContent = err.message || 'Unable to load transactions';
        state.all = [];
        state.filtered = [];
      }
    }

    quickPills.addEventListener('click', (e) => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      quickPills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      state.preset = btn.dataset.preset || 'all';
      renderTransactions();
    });

    searchInput.addEventListener('input', renderTransactions);
    statusFilter.addEventListener('change', renderTransactions);
    serviceFilter.addEventListener('change', renderTransactions);
    refreshBtn.addEventListener('click', loadDashboardData);

    closeReceiptBtn.addEventListener('click', closeReceipt);
    receiptModal.addEventListener('click', (e) => {
      if (e.target === receiptModal) closeReceipt();
    });

    receiptDetails.addEventListener('click', (e) => {
      const btn = e.target.closest('.mini-copy-btn');
      if (!btn) return;
      copyTextToClipboard(btn.dataset.copy || '');
    });

    copyBtn.addEventListener('click', copySelectedId);
    shareBtn.addEventListener('click', shareReceiptImage);
    downloadBtn.addEventListener('click', downloadReceiptImage);
    saveBtn.addEventListener('click', saveReceiptImage);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && receiptModal.style.display === 'flex') closeReceipt();
    });

    loadDashboardData();
  </script>
