<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FunSub | Transactions</title>

  <style>
    :root{
      --gold:#c89a24;
      --gold-soft:rgba(200,154,36,.14);
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --bg:#ffffff;
      --card:#ffffff;
      --surface:#ffffff;
      --input-bg:#ffffff;
      --modal-bg:#ffffff;
      --shadow:0 18px 45px rgba(0,0,0,.08);
      --success:#0f7a3b;
      --danger:#b42318;
      --info:#1d4ed8;
      --pending:#8a6d00;
    }

    body.dark{
      --gold:#c89a24;
      --gold-soft:#2a2310;
      --text:#f3f4f6;
      --muted:#b8c0cc;
      --border:#2b2f38;
      --bg:#0f1115;
      --card:#1a1d24;
      --surface:#1a1d24;
      --input-bg:#232833;
      --modal-bg:#1a1d24;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --success:#34d399;
      --danger:#f87171;
      --info:#60a5fa;
      --pending:#fbbf24;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    .page{
      min-height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 28px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:60px;
      padding-top:6px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:0;
      width:100%;
      text-align:center;
    }

    .brand-text{
      width:100%;
      margin-bottom:0;
      text-align:center;
    }

    .brand-text h1{
      margin:0;
      font-size:24px;
      letter-spacing:-.03em;
      text-align:center;
    }

    .brand-text p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
      text-align:center;
    }

    .top-actions{display:none}

    .icon-btn{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      padding:14px;
    }

    .summary-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      min-height:92px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
    }

    .summary-card .big{font-size:26px;font-weight:800;line-height:1}
    .summary-card .small{font-size:12px;color:var(--muted)}
    .summary-card.success .big{color:var(--success)}
    .summary-card.pending .big{color:var(--pending)}
    .summary-card.failed .big{color:var(--danger)}
    .summary-card.reversed .big{color:var(--info)}

    .controls{
      display:grid;
      grid-template-columns:1.4fr .9fr .9fr;
      gap:12px;
      padding:0 14px 14px;
    }

    .search-wrap,
    .select-wrap{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      height:48px;
    }

    .search-wrap input,
    .select-wrap select{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }

    .search-wrap input::placeholder{color:var(--muted)}
    .select-wrap select{appearance:none;cursor:pointer}

    .list-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:0 14px 14px;
    }

    .list-head h2{
      margin:0;
      font-size:18px;
      text-align:center;
      width:100%;
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:0 14px 14px;
    }

    .pill{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
    }

    .pill.active{
      background:var(--gold-soft);
      border-color:rgba(200,154,36,.45);
      color:var(--gold);
      font-weight:700;
    }

    .transactions{
      padding:0 14px 14px;
      display:grid;
      gap:10px;
    }

    .tx-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      transition:transform .15s ease, border-color .15s ease, background .15s ease;
      min-width:0;
    }

    .tx-card:hover{
      transform:translateY(-1px);
      border-color:rgba(200,154,36,.35);
    }

    .tx-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
    }

    .tx-logo{
      width:44px;
      height:44px;
      border-radius:14px;
      background:#fff;
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 44px;
      border:1px solid rgba(0,0,0,.06);
    }

    .tx-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:4px;
    }

    .tx-meta{min-width:0; flex:1 1 auto;}
    .tx-title{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin:0 0 4px;
    }

    .tx-sub{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
      overflow:hidden;
    }

    .tx-sub span{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .tx-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:6px;
      flex:0 0 auto;
      min-width:92px;
      margin-left:auto;
    }

    .tx-amount{
      font-size:16px;
      font-weight:800;
      text-align:right;
      white-space:nowrap;
    }

    .status-chip{
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
      text-transform:capitalize;
      white-space:nowrap;
    }

    .status-success{background:rgba(34,197,94,.12);color:var(--success);border-color:rgba(34,197,94,.25)}
    .status-pending{background:rgba(245,158,11,.12);color:var(--pending);border-color:rgba(245,158,11,.25)}
    .status-failed{background:rgba(239,68,68,.12);color:var(--danger);border-color:rgba(239,68,68,.25)}
    .status-reversed{background:rgba(59,130,246,.12);color:var(--info);border-color:rgba(59,130,246,.25)}

    .empty,
    .error-state,
    .loading{
      padding:40px 18px;
      text-align:center;
      color:var(--muted);
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:20px;
      margin:0 14px 14px;
    }
    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
      backdrop-filter:blur(7px);
    }

    .modal-close-btn{
      position:absolute;
      top:18px;
      right:18px;
      width:42px;
      height:42px;
      border-radius:50%;
      border:0;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:22px;
      cursor:pointer;
      z-index:10000;
      display:grid;
      place-items:center;
    }

    .receipt-shell{
      width:min(86vw, 392px);
      max-height:min(86vh, 860px);
      overflow:visible;
      border-radius:28px;
      background:transparent;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      position:relative;
    }

    .receipt-card{
      background:linear-gradient(180deg, #0b0b0d 0 34%, #f7f7f7 34% 100%);
      color:var(--text);
      border-radius:28px;
      overflow:hidden;
      position:relative;
      border:1px solid rgba(200,154,36,.55);
    }

    .receipt-header{
      background:linear-gradient(180deg, #0b0b0d 0%, #121214 100%);
      color:#fff;
      padding:12px 12px 24px;
      text-align:center;
      position:relative;
    }

    .receipt-header::after{
      content:"";
      position:absolute;
      left:-4%;
      right:-4%;
      bottom:-15px;
      height:32px;
      background:#f7f7f7;
      border-top-left-radius:50% 100%;
      border-top-right-radius:50% 100%;
      border-bottom:3px solid var(--gold);
      box-sizing:border-box;
    }

    .receipt-logo-wrap{
      width:54px;
      height:54px;
      border-radius:50%;
      margin:0 auto 8px;
      background:rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      overflow:hidden;
      border:1px solid rgba(200,154,36,.35);
    }

    .receipt-logo-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .receipt-brand{
      margin:0;
      font-size:19px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1;
    }

    .receipt-brand .gold{color:var(--gold)}

    .receipt-subtitle{
      margin:3px 0 0;
      font-size:12px;
      color:#e5e7eb;
      opacity:.92;
    }

    .receipt-body{
      padding:10px 10px 12px;
      margin-top:4px;
    }

    .amount-card{
      background:linear-gradient(180deg, #fffaf0, #fffdf8);
      border:1px solid rgba(200,154,36,.28);
      border-radius:22px;
      padding:11px 9px;
      text-align:center;
      margin-bottom:9px;
    }

    .amount-card .label{
      font-size:13px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .amount-card .amount{
      font-size:26px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.05em;
      color:#111827;
      white-space:nowrap;
    }

    .detail-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:8px 9px;
      box-shadow:0 10px 28px rgba(17,24,39,.04);
    }

    .detail-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:8px 0;
      border-bottom:1px dashed #e5e7eb;
      font-size:12px;
      line-height:1.2;
    }

    .detail-row:last-child{border-bottom:0}

    .detail-label{
      color:#4b5563;
      min-width:84px;
      flex:0 0 auto;
    }

    .detail-value{
      font-weight:700;
      color:#111827;
      text-align:right;
      word-break:break-word;
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      min-width:0;
    }

    .detail-text{
      min-width:0;
      flex:1 1 auto;
    }

    .mini-copy-btn{
      width:22px;
      height:22px;
      border:0;
      border-radius:7px;
      background:rgba(200,154,36,.12);
      color:var(--gold);
      font-size:13px;
      line-height:1;
      cursor:pointer;
      display:grid;
      place-items:center;
      flex:0 0 22px;
      padding:0;
    }

    .provider-mini{
      display:inline-flex;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
      vertical-align:middle;
      min-width:0;
      max-width:100%;
    }

    .provider-mini img{
      width:24px;
      height:24px;
      object-fit:contain;
      border-radius:7px;
      border:1px solid rgba(0,0,0,.05);
      background:#fff;
      flex:0 0 24px;
      padding:1px;
    }

    .provider-mini span{
      display:inline-block;
      max-width:120px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status-inline{
      font-weight:800;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .status-inline::before{
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      display:inline-block;
      background:currentColor;
    }

    .status-inline.success{color:var(--success)}
    .status-inline.pending{color:var(--pending)}
    .status-inline.reversed{color:var(--info)}
    .status-inline.failed{color:var(--danger)}

    .button-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:9px;
      margin-top:9px;
    }

    .receipt-btn{
      height:44px;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .receipt-btn.dark{background:#0b0b0d;color:#fff}
    .receipt-btn.gold{background:var(--gold);color:#111}
    .receipt-btn.light{background:#f3f4f6;color:#111827;border:1px solid #e5e7eb}

    .receipt-footer{
      text-align:center;
      color:#6b7280;
      padding:10px 8px 0;
      font-size:11px;
      line-height:1.35;
    }

    .receipt-footer-brand{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin-top:6px;
      margin-bottom:2px;
    }

    .receipt-footer-brand img{
      width:22px;
      height:22px;
      object-fit:cover;
      border-radius:6px;
      display:block;
    }

    .receipt-footer strong{
      display:block;
      color:#0f172a;
      margin-top:4px;
    }

    .receipt-footer .gold{
      color:var(--gold);
      font-weight:700;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      visibility:hidden;
      background:rgba(17,24,39,.96);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 16px;
      z-index:10000;
      box-shadow:var(--shadow);
      transition:.25s ease;
      font-size:14px;
      max-width:min(92vw, 480px);
      text-align:center;
    }

    .toast.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    @media print{
      body{background:#fff !important}
      body *{visibility:hidden !important}
      .receipt-shell, .receipt-shell *{visibility:visible !important}
      .modal-overlay{position:static;background:#fff;display:block !important;padding:0}
      .receipt-shell{max-height:none;width:100%;box-shadow:none}
      .receipt-card{border-radius:0}
      .topbar,.summary-grid,.controls,.pill-row,.transactions,.toast{display:none !important}
      .modal-close-btn{display:none !important}
    }

    @media (max-width: 900px){
      .summary-grid{grid-template-columns:repeat(2,1fr)}
      .controls{grid-template-columns:1fr}
    }

    @media (max-width: 520px){
      .page{padding:14px 12px 20px}
      .brand-text h1{font-size:22px}
      .brand-text p{font-size:12px}
      .topbar{margin-bottom:42px}
      .summary-grid{padding:12px;gap:10px}
      .summary-card{min-height:84px}
      .tx-card{padding:12px}
      .tx-title{font-size:14px}
      .tx-right{min-width:84px}
      .tx-logo{width:40px;height:40px;flex-basis:40px}
      .receipt-shell{width:min(88vw, 332px)}
      .receipt-header{padding:12px 11px 22px}
      .receipt-header::after{height:28px;bottom:-13px}
      .receipt-logo-wrap{width:50px;height:50px}
      .receipt-brand{font-size:18px}
      .receipt-subtitle{font-size:11px}
      .receipt-body{padding:9px 9px 11px}
      .amount-card{padding:10px 8px;margin-bottom:8px}
      .amount-card .amount{font-size:24px}
      .detail-card{padding:7px 8px}
      .detail-row{padding:7px 0;font-size:11px;gap:8px}
      .detail-label{min-width:78px}
      .provider-mini span{max-width:96px}
      .button-grid{gap:8px;margin-top:8px}
      .receipt-btn{height:41px;font-size:12px}
      .receipt-footer{padding-top:9px;font-size:10px}
      .modal-close-btn{top:12px;right:12px;width:38px;height:38px;font-size:20px}
    }
  </style>
</head>
