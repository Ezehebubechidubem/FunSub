<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FunSub | Fund Betting</title>

<style>
  :root{
    --bg:#ffffff; --card:#ffffff; --text:#111; --border:#dddddd;
    --input-bg:#ffffff; --modal-bg:#ffffff; --muted:#666;
    --gold:#D4AF37; --gold-soft:#FFF9E6; --gold-border:#f0d98a;
    --shadow:0 15px 40px rgba(0,0,0,.16);
  }
  body.dark{
    --bg:#0f1115; --card:#1a1d24; --text:#ffffff; --border:#2b2f38;
    --input-bg:#232833; --modal-bg:#1a1d24; --muted:#b8c0cc;
    --gold:#D4AF37; --gold-soft:#2c2410; --gold-border:#7b6522;
    --shadow:0 15px 40px rgba(0,0,0,.28);
  }
  *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
  body{ background:var(--bg); padding:20px; color:var(--text); }
  h1{ color:var(--text); display:flex; justify-content:center; margin-bottom:10px; font-size:28px; font-weight:700; }
 .subtitle{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:30px; }
 .container{ max-width:500px; margin:auto; }
 .form-box{ background:var(--card); padding:20px; border-radius:18px; }
  label{ display:block; margin-top:20px; margin-bottom:8px; font-weight:700; font-size:15px; color:var(--text); }
  input{ width:100%; height:55px; border:1px solid var(--border); border-radius:14px; padding:0 15px; font-size:15px; outline:none; background:var(--input-bg); color:var(--text); }
  input::placeholder{ color:var(--muted); }
  input:focus{ border-color:var(--gold); }
 .input-group{ display:flex; gap:10px; align-items:flex-end; }
 .verify-btn{ height:55px; padding:0 18px; border:none; border-radius:14px; background:var(--gold); color:white; font-weight:700; cursor:pointer; white-space:nowrap; }
 .verify-btn:disabled{ opacity:.7; cursor:not-allowed; }
 .user-info{ background:var(--gold-soft); border:1px solid var(--gold-border); padding:12px; border-radius:12px; margin-top:12px; display:none; color:var(--gold); font-weight:700; }

  /* 2 COLUMNS + SHOW 4 INITIALLY */
 .platform-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:15px; margin-top:10px; }
 .platform-card{ border:2px solid var(--border); border-radius:18px; padding:18px; cursor:pointer; background:var(--card); display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:90px; transition:.2s ease; }
 .platform-card:hover{ transform:translateY(-1px); }
 .platform-card img{ width:46px; height:46px; object-fit:contain; margin-bottom:6px; }
 .platform-card span{ font-size:13px; font-weight:700; }
 .platform-card.active{ border-color:var(--gold); background:var(--gold-soft); }
 .platform-card.hidden{ display:none; }

 .show-more-btn{ width:100%; height:45px; border:1px dashed var(--border); border-radius:12px; margin-top:15px; background:transparent; color:var(--muted); font-weight:700; cursor:pointer; }
 .buy-btn{ width:100%; height:55px; border:none; border-radius:15px; margin-top:25px; background:var(--gold); color:white; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 10px 20px rgba(212,175,55,.18); }
 .buy-btn:disabled{ opacity:.7; cursor:not-allowed; }

 .transaction-modal{ position:fixed; inset:0; background:rgba(0,0,0,.65); display:none; justify-content:center; align-items:center; z-index:9999; padding:16px; }
 .transaction-card{ width:95%; max-width:430px; background:var(--modal-bg); color:var(--text); border-radius:25px; padding:25px; box-shadow:var(--shadow); }
 .transaction-icon{ width:90px; height:90px; border-radius:50%; margin:auto; display:flex; justify-content:center; align-items:center; font-size:45px; background:#FFF8E1; }
 .transaction-card h2{ text-align:center; margin-top:15px; font-size:22px; }
 .transaction-card p{ text-align:center; color:var(--muted); margin-top:10px; font-size:14px; }
 .receipt-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; }
 .close-btn,.share-btn{ width:100%; height:50px; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px; }
 .close-btn{ margin-top:14px; background:var(--gold); color:white; }
 .share-btn{ margin-top:10px; background:#111827; color:white; }
 .pending{ background:#FFF8E1; color:#8a6d00; }.success{ background:#ECFDF3; color:#0f7a3b; }.failed{ background:#FEE4E2; color:#b42318; }

 .pin-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:10000; display:none; justify-content:center; align-items:flex-end; }
 .pin-sheet{ width:100%; max-width:700px; background:var(--modal-bg); border-radius:24px 24px 0 0; padding:18px 16px 24px; }
 .pin-close{ width:36px; height:36px; border:none; background:transparent; font-size:28px; color:var(--text); cursor:pointer; float:right; }
 .pin-title{ text-align:center; font-size:22px; font-weight:700; }
 .pin-boxes{ display:flex; justify-content:center; gap:12px; margin:16px 0; }
 .pin-box{ width:58px; height:58px; border-radius:16px; border:1.8px solid var(--border); background:var(--input-bg); display:flex; justify-content:center; align-items:center; font-size:26px; font-weight:700; }
 .pin-box.filled{ border-color:#9fd8c8; background:rgba(159,216,200,.15); }
 .pin-keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
 .pin-key{ height:72px; border:none; border-radius:12px; background:var(--card); font-size:28px; font-weight:500; cursor:pointer; box-shadow:0 0 0 1px var(--border) inset; }
 .pin-zero{ grid-column:1 / span 2; }
</style>
</head>

<body>
  <h1>FunSub Betting</h1>
  <div class="subtitle">Fund any betting account instantly from your wallet</div>

  <div class="container">
    <div class="form-box">
      <label>Betting Platform</label>
      <div class="platform-grid" id="platformGrid"></div>
      <button class="show-more-btn" id="showMoreBtn" onclick="togglePlatforms()">Show More</button>

      <label>Enter User ID</label>
      <div class="input-group">
        <input type="text" id="customerId" placeholder="Enter betting User ID">
        <button class="verify-btn" id="verifyBtn" onclick="verifyCustomer()">Verify</button>
      </div>
      <div class="user-info" id="userInfo">✅ <span id="accountName"></span></div>

      <label>Amount to Fund (₦)</label>
      <input type="number" id="amount" placeholder="Enter amount">

      <button id="buyBtn" class="buy-btn">Pay</button>
    </div>
  </div>

  <div id="transactionModal" class="transaction-modal">
    <div class="transaction-card">
      <div id="transactionIcon" class="transaction-icon">⏳</div>
      <h2 id="transactionTitle">Processing Transaction</h2>
      <p id="transactionMessage">Please wait...</p>
      <div id="receiptSection" style="display:none; margin-top:18px;">
        <div class="receipt-row"><span>Platform</span><span id="receiptPlatform"></span></div>
        <div class="receipt-row"><span>User ID</span><span id="receiptCustomerId"></span></div>
        <div class="receipt-row"><span>Account Name</span><span id="receiptAccountName"></span></div>
        <div class="receipt-row"><span>Amount</span><span id="receiptAmount"></span></div>
        <div class="receipt-row"><span>Reference</span><span id="receiptReference"></span></div>
        <div class="receipt-row"><span>Status</span><span id="receiptStatus"></span></div>
        <div class="receipt-row"><span>Date</span><span id="receiptDate"></span></div>
      </div>
      <button onclick="closeModal()" class="close-btn">Close</button>
      <button onclick="shareReceipt()" class="share-btn">Share</button>
    </div>
  </div>

  <div id="pinOverlay" class="pin-overlay">
    <div class="pin-sheet">
      <button type="button" class="pin-close" onclick="closePinModal()">×</button>
      <h2 class="pin-title">Enter Payment PIN</h2>
      <div class="pin-boxes">
        <div class="pin-box" id="pinBox0"></div><div class="pin-box" id="pinBox1"></div>
        <div class="pin-box" id="pinBox2"></div><div class="pin-box" id="pinBox3"></div>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pressPin('1')">1</button><button class="pin-key" onclick="pressPin('2')">2</button><button class="pin-key" onclick="pressPin('3')">3</button>
        <button class="pin-key" onclick="pressPin('4')">4</button><button class="pin-key" onclick="pressPin('5')">5</button><button class="pin-key" onclick="pressPin('6')">6</button>
        <button class="pin-key" onclick="pressPin('7')">7</button><button class="pin-key" onclick="pressPin('8')">8</button><button class="pin-key" onclick="pressPin('9')">9</button>
        <button class="pin-key pin-zero" onclick="pressPin('0')">0</button><button class="pin-key" onclick="backspacePin()">⌫</button>
      </div>
    </div>
  </div>
<script src="theme.js" defer></script>
<script>
  const VERIFY_URL = "https://funsub.onrender.com/api/services/betting/verify";
  const BUY_URL = "https://funsub.onrender.com/api/services/betting";

  const BETTING_PLATFORMS = [
    { id: "1xBet", name: "1xBet", service_id: "1xBet", logo: "https://i.postimg.cc/MKq4Rjbz/IMG-20260704-153140.jpg" },
    { id: "BangBet", name: "BangBet", service_id: "BangBet", logo: "https://i.postimg.cc/Y2RjKZRS/IMG-20260704-160404.jpg" },
    { id: "Bet9ja", name: "Bet9ja", service_id: "Bet9ja", logo: "https://i.postimg.cc/g2YWYTTF/IMG-20260704-153103.jpg" },
    { id: "BetKing", name: "BetKing", service_id: "BetKing", logo: "https://i.postimg.cc/V6XG0YJ4/IMG-20260704-153020.jpg" },
    { id: "BetLand", name: "BetLand", service_id: "BetLand", logo: "https://i.postimg.cc/fytPK6TK/IMG-20260704-160941.jpg" },
    { id: "BetLion", name: "BetLion", service_id: "BetLion", logo: "https://i.postimg.cc/NGC92ZHC/IMG-20260704-161648.jpg" },
    { id: "BetWay", name: "BetWay", service_id: "BetWay", logo: "https://i.postimg.cc/qqM5PP7Q/IMG-20260704-155102.jpg" },
    { id: "CloudBet", name: "CloudBet", service_id: "CloudBet", logo: "https://i.postimg.cc/xyz/cloudbet.png" },
    { id: "LiveScoreBet", name: "LiveScoreBet", service_id: "LiveScoreBet", logo: "https://i.postimg.cc/xyz/livescore.png" },
    { id: "MerryBet", name: "MerryBet", service_id: "MerryBet", logo: "https://i.postimg.cc/xyz/merrybet.png" },
    { id: "NaijaBet", name: "NaijaBet", service_id: "NaijaBet", logo: "https://i.postimg.cc/xyz/naijabet.png" },
    { id: "NairaBet", name: "NairaBet", service_id: "NairaBet", logo: "https://i.postimg.cc/xyz/nairabet.png" },
    { id: "SupaBet", name: "SupaBet", service_id: "SupaBet", logo:     "https://i.postimg.cc/J7GSMBch/IMG-20260704-155654.jpg"}
  ];
  let currentPlatform = BETTING_PLATFORMS[0];
  let showAll = false;
  let verifiedAccountName = "";
  let enteredPin = ""; let pendingPayload = null; let lastReceipt = null;

  function getToken() { return localStorage.getItem("funsub_token") || ""; }
  function generateRequestId(prefix = "BET") { return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 6).toUpperCase()}`; }
  function formatNaira(value) { return "₦" + Number(value).toLocaleString("en-NG"); }

  function renderPlatforms() {
    const grid = document.getElementById("platformGrid");
    grid.innerHTML = "";
    BETTING_PLATFORMS.forEach((p, index) => {
      const card = document.createElement("div");
      card.className = "platform-card";
      if(index >= 4 &&!showAll) card.classList.add("hidden");
      card.innerHTML = `<img src="${p.logo}" onerror="this.style.display='none'"><span>${p.name}</span>`;
      card.onclick = () => {
        document.querySelectorAll(".platform-card").forEach(c => c.classList.remove("active"));
        card.classList.add("active"); currentPlatform = p; resetVerification();
      };
      grid.appendChild(card);
    });
    document.querySelector('.platform-card').classList.add('active');
    document.getElementById("showMoreBtn").innerText = showAll? "Show Less" : "Show More";
  }
  function togglePlatforms() { showAll =!showAll; renderPlatforms(); }
  function resetVerification() { verifiedAccountName = ""; document.getElementById("userInfo").style.display = "none"; }

  async function verifyCustomer() {
    const token = getToken(); const customer_id = document.getElementById("customerId").value.trim();
    if(!token) return alert("Please login first"); if(!customer_id) return alert("Enter User ID");
    const btn = document.getElementById("verifyBtn"); btn.disabled = true; btn.innerText = "Verifying...";
    try {
      const res = await fetch(VERIFY_URL, { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }, body: JSON.stringify({ customer_id, service_id: currentPlatform.service_id }) });
      const data = await res.json();
      if(res.ok) {
        verifiedAccountName = data.customer_name || "Verified User";
        document.getElementById("accountName").innerText = verifiedAccountName;
        document.getElementById("userInfo").style.display = "block";
      } else { alert(data.message || "Verification failed"); resetVerification(); }
    } catch(e){ alert("Unable to verify customer"); resetVerification(); }
    finally { btn.disabled = false; btn.innerText = "Verify"; }
  }

  function openPinModal(payload) { enteredPin = ""; pendingPayload = payload; renderPinBoxes(); document.getElementById("pinOverlay").style.display = "flex"; }
  function closePinModal() { document.getElementById("pinOverlay").style.display = "none"; }
  function renderPinBoxes() { for (let i = 0; i < 4; i++) { const box = document.getElementById(`pinBox${i}`); const hasDigit = i < enteredPin.length; box.textContent = hasDigit? "•" : ""; box.classList.toggle("filled", hasDigit); } }
  function pressPin(digit) { if (enteredPin.length >= 4) return; enteredPin += digit; renderPinBoxes(); if (enteredPin.length === 4) { const payload = pendingPayload; closePinModal(); sendBettingRequest(payload, enteredPin); } }
  function backspacePin() { enteredPin = enteredPin.slice(0, -1); renderPinBoxes(); }

  async function buyBetting() {
    const token = getToken(); const customer_id = document.getElementById("customerId").value.trim(); const amount = document.getElementById("amount").value;
    if (!token) return alert("Please login first"); if (!customer_id) return alert("Enter User ID"); if (!verifiedAccountName) return alert("Please verify User ID first"); if (!amount || amount <= 0) return alert("Enter valid amount");
    openPinModal({ token, customer_id, service_id: currentPlatform.service_id, amount: Number(amount), platformName: currentPlatform.name });
  }

  async function sendBettingRequest(payload, fundPin) {
    const { token, customer_id, service_id, amount, platformName } = payload; const request_id = generateRequestId("BET");
    showProcessingModal(); const buyBtn = document.getElementById("buyBtn"); buyBtn.disabled = true; buyBtn.innerText = "Processing...";
    try {
      const response = await fetch(BUY_URL, { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }, body: JSON.stringify({ request_id, customer_id, service_id, amount, fundPin }) });
      const data = await response.json(); const status = String(data.status || data.result?.status || "").toLowerCase(); const reference = data.reference || data.result?.reference || request_id;
      if(response.ok && (data.success || status === "success")) {
        showSuccessModal(data.message || "Transaction successful"); setReceiptValues({ platformName, customer_id, account_name: verifiedAccountName, amount, reference, status: "success" });
      } else if(status === "pending") { showPendingModal(data.message || "Transaction pending"); setReceiptValues({ platformName, customer_id, account_name: verifiedAccountName, amount, reference, status: "pending" }); }
      else { showFailedModal(data.message || "Transaction failed"); }
    } catch(error){ showFailedModal("Unable to complete transaction"); }
    finally { buyBtn.disabled = false; buyBtn.innerText = "Pay"; }
  }

  function setReceiptValues({ platformName, customer_id, account_name, amount, reference, status }) {
    document.getElementById("receiptPlatform").innerText = platformName;
    document.getElementById("receiptCustomerId").innerText = customer_id;
    document.getElementById("receiptAccountName").innerText = account_name;
    document.getElementById("receiptAmount").innerText = formatNaira(amount);
    document.getElementById("receiptReference").innerText = reference;
    document.getElementById("receiptStatus").innerText = status;
    document.getElementById("receiptDate").innerText = new Date().toLocaleString();
    document.getElementById("receiptSection").style.display = "block";
    lastReceipt = { platformName, customer_id, account_name, amount: formatNaira(amount), reference, status, date: new Date().toLocaleString() };
  }
  function buildReceiptText() { if (!lastReceipt) return ""; const r = lastReceipt; return [`FunSub Betting Receipt`,`Platform: ${r.platformName}`,`User ID: ${r.customer_id}`,`Account Name: ${r.account_name}`,`Amount: ${r.amount}`,`Reference: ${r.reference}`,`Status: ${r.status}`,`Date: ${r.date}`].join("\n"); }
  async function shareReceipt() { const text = buildReceiptText(); if (!text) return; if (navigator.share) { try { await navigator.share({ title: "FunSub Betting Receipt", text }); return; } catch(e){} } alert("Sharing is not supported"); }

  function showProcessingModal() { document.getElementById("transactionModal").style.display = "flex"; document.getElementById("receiptSection").style.display = "none"; document.getElementById("transactionIcon").className = "transaction-icon"; document.getElementById("transactionIcon").innerHTML = "⏳"; document.getElementById("transactionTitle").innerText = "Processing Transaction"; document.getElementById("transactionMessage").innerText = "Please wait..."; }
  function showPendingModal(message) { document.getElementById("transactionModal").style.display = "flex"; document.getElementById("receiptSection").style.display = "none"; document.getElementById("transactionIcon").className = "transaction-icon pending"; document.getElementById("transactionIcon").innerHTML = "🟡"; document.getElementById("transactionTitle").innerText = "Transaction Pending"; document.getElementById("transactionMessage").innerText = message || "Your transaction is pending."; }
  function showFailedModal(message) { document.getElementById("transactionModal").style.display = "flex"; document.getElementById("receiptSection").style.display = "none"; document.getElementById("transactionIcon").className = "transaction-icon failed"; document.getElementById("transactionIcon").innerHTML = "❌"; document.getElementById("transactionTitle").innerText = "Transaction Failed"; document.getElementById("transactionMessage").innerText = message || "Unable to complete transaction."; }
  function showSuccessModal(message) { document.getElementById("transactionModal").style.display = "flex"; document.getElementById("receiptSection").style.display = "block"; document.getElementById("transactionIcon").className = "transaction-icon success"; document.getElementById("transactionIcon").innerHTML = "✅"; document.getElementById("transactionTitle").innerText = "Transaction Successful"; document.getElementById("transactionMessage").innerText = message || "Transaction successful"; }
  function closeModal() { document.getElementById("transactionModal").style.display = "none"; }

  document.getElementById("buyBtn").addEventListener("click", buyBetting);
  window.addEventListener("DOMContentLoaded", renderPlatforms);
  document.addEventListener("keydown", (e) => { if (document.getElementById("pinOverlay").style.display === "flex") { if (/^\d$/.test(e.key)) pressPin(e.key); if (e.key === "Backspace") backspacePin(); if (e.key === "Escape") closePinModal(); } });
</script>
</body>
</html>
