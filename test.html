<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Data</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .topbar {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #eee;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .user-box {
      font-size: 14px;
      color: #444;
    }

    .user-box strong {
      color: #0b6bcb;
    }

    .logout-btn {
      border: none;
      background: #e11d48;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .logout-btn:hover {
      opacity: 0.92;
    }

    h2 { margin-bottom: 8px; }

    .sub {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0 18px;
    }

    .btns button {
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btns button:hover { background: #555; }

    .btns button.active { background: #0b6bcb; }

    .form-box {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    select, input, button.primary {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #d9e1ea;
      outline: none;
      font-size: 15px;
      background: #fff;
    }

    select:focus, input:focus {
      border-color: #0b6bcb;
    }

    button.primary {
      margin-top: 16px;
      background: #0b6bcb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary:hover {
      opacity: 0.95;
    }

    #status {
      margin: 10px 0 15px;
      font-weight: bold;
      min-height: 24px;
    }

    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border: 1px solid #eee;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #cfe0ff;
    }

    .card.selected {
      border-color: #0b6bcb;
      box-shadow: 0 0 0 2px rgba(11, 107, 203, 0.12);
    }

    .plan-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .price {
      color: #0a8f2a;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .empty {
      background: white;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #eee;
    }

    .loading { opacity: 0.7; }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="user-box" id="userBox">Not logged in</div>
      <button class="logout-btn" type="button" onclick="logout()">Logout</button>
    </div>

    <h2>📡 Buy Data</h2>
    <p class="sub">Select network, choose a plan, then buy with your wallet.</p>

    <div class="btns">
      <button type="button" onclick="loadPlans('mtn', this)">MTN</button>
      <button type="button" onclick="loadPlans('glo', this)">GLO</button>
      <button type="button" onclick="loadPlans('airtel', this)">Airtel</button>
      <button type="button" onclick="loadPlans('9mobile', this)">9mobile</button>
    </div>

    <div class="form-box">
      <label>Selected Plan</label>
      <select id="planSelect">
        <option value="">Loading plans...</option>
      </select>

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="08012345678" />

      <button class="primary" type="button" onclick="buyData()">Buy Data</button>
    </div>

    <div id="status"></div>
    <div id="plans" class="plans-grid"></div>
  </div>

  <script>
    const BASE_URL = "https://funsub.onrender.com/api/services/data/plans";
    const BUY_URL = "https://funsub.onrender.com/api/services/data";

    const planSelect = document.getElementById("planSelect");
    const plansEl = document.getElementById("plans");
    const statusEl = document.getElementById("status");
    const userBox = document.getElementById("userBox");

    let currentNetwork = "mtn";
    let currentPlans = [];

    function getToken() {
      return localStorage.getItem("token") || localStorage.getItem("authToken") || "";
    }

    function getUser() {
      const raw =
        localStorage.getItem("user") ||
        localStorage.getItem("currentUser") ||
        localStorage.getItem("profile") ||
        "";

      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function updateUserBox() {
      const user = getUser();
      const token = getToken();

      if (user?.email || user?.username || user?.name || token) {
        userBox.innerHTML = `
          Logged in as <strong>${user?.username || user?.name || user?.email || "User"}</strong>
          ${user?.id ? ` (ID: ${user.id})` : ""}
        `;
      } else {
        userBox.textContent = "Not logged in";
      }
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("authToken");
      localStorage.removeItem("user");
      localStorage.removeItem("currentUser");
      localStorage.removeItem("profile");
      location.href = "login.html";
    }

    function getServiceID(network) {
      const map = {
        mtn: "mtn-data",
        glo: "glo-data",
        airtel: "airtel-data",
        "9mobile": "etisalat-data"
      };
      return map[String(network || "").trim().toLowerCase()] || "";
    }

    function formatNaira(value) {
      const num = Number(value);
      if (Number.isNaN(num)) return "N/A";
      return "₦" + num.toLocaleString("en-NG", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function cleanPlanName(name) {
      if (!name) return "Data Plan";

      let cleaned = String(name).trim();
      cleaned = cleaned.replace(
        /\s*[-–—]\s*(?:₦|N|NGN)?\s*[\d,]+(?:\.\d+)?\s*$/i,
        ""
      );
      cleaned = cleaned.replace(/\s+/g, " ").trim();

      return cleaned || "Data Plan";
    }

    function setStatus(message, type = "info") {
      statusEl.className = "";
      statusEl.style.padding = "10px 0";
      statusEl.style.fontWeight = "bold";
      if (type === "error") statusEl.style.color = "#b42318";
      else if (type === "success") statusEl.style.color = "#0f7a3b";
      else statusEl.style.color = "#0b6bcb";
      statusEl.textContent = message;
    }

    function setActiveButton(activeBtn) {
      document.querySelectorAll(".btns button").forEach(btn => {
        btn.classList.remove("active");
      });
      if (activeBtn) activeBtn.classList.add("active");
    }

    function setSelectedCard(planId) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.remove("selected");
        if (card.dataset.planId === String(planId)) {
          card.classList.add("selected");
        }
      });
    }

    function renderPlans(plans) {
      plansEl.innerHTML = "";
      currentPlans = plans;

      if (!plans.length) {
        plansEl.innerHTML = `<div class="empty">No plans found</div>`;
        return;
      }

      plans.forEach((plan, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.planId = String(plan.id);

        const displayName = cleanPlanName(plan?.name);
        const finalPrice = plan?.pricing?.finalPrice;
        const rawPrice = plan?.rawPrice;

        card.innerHTML = `
          <div class="plan-name">${displayName}</div>
          <div class="price">${formatNaira(finalPrice)}</div>
          <div class="small">Plan ID: ${plan.id || "N/A"}</div>
        `;

        card.addEventListener("click", () => {
          planSelect.value = String(plan.id);
          setSelectedCard(plan.id);
        });

        plansEl.appendChild(card);

        const option = document.createElement("option");
        option.value = String(plan.id);
        option.textContent = `${displayName} — ${formatNaira(finalPrice)}`;
        option.dataset.rawPrice = String(rawPrice ?? "");
        option.dataset.planName = String(plan?.name || "");
        planSelect.appendChild(option);

        if (index === 0) {
          planSelect.value = String(plan.id);
          card.classList.add("selected");
        }
      });

      planSelect.onchange = () => {
        setSelectedCard(planSelect.value);
      };
    }

    async function loadPlans(network, btnEl) {
      currentNetwork = network;
      setActiveButton(btnEl);

      setStatus(`Loading ${network.toUpperCase()} plans...`, "info");
      planSelect.innerHTML = `<option value="">Loading...</option>`;
      plansEl.innerHTML = `<div class="empty loading">Please wait...</div>`;

      try {
        const token = getToken();
        if (!token) {
          setStatus("You are not logged in. Please log in first.", "error");
          planSelect.innerHTML = `<option value="">Login required</option>`;
          plansEl.innerHTML = `<div class="empty">Login required</div>`;
          return;
        }

        const serviceID = getServiceID(network);

        const res = await fetch(
          `${BASE_URL}?network=${encodeURIComponent(network)}&serviceID=${encodeURIComponent(serviceID)}`,
          {
            headers: {
              "Authorization": `Bearer ${token}`
            }
          }
        );

        const data = await res.json();
        console.log("API RESPONSE:", data);

        if (res.status === 401) {
          setStatus("Please log in again", "error");
          planSelect.innerHTML = `<option value="">Unauthorized</option>`;
          plansEl.innerHTML = `<div class="empty">Your session expired. Please log in again.</div>`;
          return;
        }

        const plans = Array.isArray(data?.plans) ? data.plans : [];

        if (!plans.length) {
          setStatus(`${network.toUpperCase()} plans loaded`, "success");
          planSelect.innerHTML = `<option value="">No plans found</option>`;
          plansEl.innerHTML = `<div class="empty">No plans available for this network.</div>`;
          return;
        }

        setStatus(`${network.toUpperCase()} plans loaded`, "success");
        planSelect.innerHTML = "";
        renderPlans(plans);
      } catch (err) {
        console.error(err);
        setStatus("Error loading plans", "error");
        planSelect.innerHTML = `<option value="">Error loading plans</option>`;
        plansEl.innerHTML = `<div class="empty">Unable to load plans right now.</div>`;
      }
    }

    async function buyData() {
      const token = getToken();
      const phone = document.getElementById("phone").value.trim();
      const variation_code = String(planSelect.value || "").trim();
      const selectedOption = planSelect.selectedOptions[0];
      const plan_name = selectedOption?.dataset.planName || "";
      const plan_amount = selectedOption?.dataset.rawPrice || "";
      const serviceID = getServiceID(currentNetwork);

      if (!token) {
        setStatus("You are not logged in. Please log in first.", "error");
        return;
      }

      if (!phone) {
        setStatus("Please enter phone number", "error");
        return;
      }

      if (!variation_code) {
        setStatus("Please select a plan", "error");
        return;
      }

      setStatus("Processing purchase...", "info");

      try {
        const res = await fetch(BUY_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            network: currentNetwork,
            serviceID,
            variation_code,
            plan_amount,
            plan_name,
            phone
          })
        });

        const data = await res.json();
        console.log("PURCHASE RESPONSE:", data);

        if (res.ok) {
          setStatus(data.message || "Purchase successful", "success");
        } else {
          setStatus(data.message || "Purchase failed", "error");
        }
      } catch (err) {
        console.error(err);
        setStatus("Transaction failed", "error");
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      updateUserBox();

      const firstBtn = document.querySelector(".btns button");
      if (getToken()) {
        loadPlans("mtn", firstBtn);
      } else {
        setStatus("You are not logged in. Please log in first.", "error");
        planSelect.innerHTML = `<option value="">Login required</option>`;
        plansEl.innerHTML = `<div class="empty">Please log in to buy data.</div>`;
      }
    });
  </script>
</body>
</html>
