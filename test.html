<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Data</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      padding: 20px;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eee;
    }

    .user-box {
      font-size: 14px;
      color: #444;
      line-height: 1.4;
    }

    .user-box strong {
      color: #0b6bcb;
    }

    .logout-btn {
      border: none;
      background: #e11d48;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .logout-btn:hover {
      opacity: 0.92;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub {
      margin: 0 0 18px;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid #d9e1ea;
      outline: none;
      font-size: 15px;
      background: #fff;
    }

    input:focus, select:focus {
      border-color: #0b6bcb;
    }

    button.primary {
      margin-top: 18px;
      background: #0b6bcb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary:hover {
      opacity: 0.95;
    }

    .network-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .network-row button {
      padding: 10px 8px;
      border: none;
      background: #e9eef5;
      cursor: pointer;
      font-weight: 700;
    }

    .network-row button.active {
      background: #0b6bcb;
      color: #fff;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .success {
      background: #e8f7ee;
      color: #0f7a3b;
    }

    .error {
      background: #fdecec;
      color: #b42318;
    }

    .info {
      background: #eef5ff;
      color: #0b6bcb;
    }

    .plans {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .plan-card {
      border: 1px solid #e8edf3;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .plan-name {
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .plan-price {
      color: #0f7a3b;
      font-weight: 700;
      font-size: 18px;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .empty {
      padding: 14px;
      background: #fafafa;
      border: 1px dashed #dfe6ee;
      border-radius: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="user-box" id="userBox">Checking login...</div>
      <button class="logout-btn" type="button" onclick="logout()">Logout</button>
    </div>

    <h2>Buy Data</h2>
    <p class="sub">Choose network, select a plan, and buy with your logged-in wallet.</p>

    <label>Network</label>
    <div class="network-row">
      <button type="button" class="net-btn active" data-network="mtn">MTN</button>
      <button type="button" class="net-btn" data-network="glo">GLO</button>
      <button type="button" class="net-btn" data-network="airtel">Airtel</button>
      <button type="button" class="net-btn" data-network="9mobile">9mobile</button>
    </div>

    <label>Data Plans</label>
    <select id="planSelect">
      <option value="">Loading plans...</option>
    </select>

    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="08012345678" />

    <button class="primary" type="button" onclick="buyData()">Buy Data</button>

    <div id="status" class="status info">Ready</div>
    <div id="plansList" class="plans"></div>
  </div>

  <script>
    const API_BASE = "https://funsub.onrender.com/api/services";
    const planSelect = document.getElementById("planSelect");
    const plansList = document.getElementById("plansList");
    const statusEl = document.getElementById("status");
    const userBox = document.getElementById("userBox");

    let currentNetwork = "mtn";

    function getToken() {
      return localStorage.getItem("token") || localStorage.getItem("authToken") || "";
    }

    function getUser() {
      const keys = ["user", "currentUser", "profile"];
      for (const key of keys) {
        const raw = localStorage.getItem(key);
        if (!raw) continue;
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }
      return null;
    }

    function updateLoginBox() {
      const token = getToken();
      const user = getUser();

      if (!token) {
        userBox.innerHTML = `Not logged in`;
        statusEl.className = "status error";
        statusEl.textContent = "You are not logged in. Please log in first.";
        return false;
      }

      const name = user?.username || user?.name || user?.email || "User";
      const id = user?.id ? ` (ID: ${user.id})` : "";
      userBox.innerHTML = `Logged in as <strong>${name}</strong>${id}`;
      return true;
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("authToken");
      localStorage.removeItem("user");
      localStorage.removeItem("currentUser");
      localStorage.removeItem("profile");
      location.href = "login.html";
    }

    function getServiceID(network) {
      const map = {
        mtn: "mtn-data",
        glo: "glo-data",
        airtel: "airtel-data",
        "9mobile": "etisalat-data"
      };
      return map[String(network || "").trim().toLowerCase()] || "";
    }

    function formatNaira(value) {
      const num = Number(value);
      if (Number.isNaN(num)) return "N/A";
      return "₦" + num.toLocaleString("en-NG", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function setStatus(message, type = "info") {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function setActiveNetworkButtons(network) {
      document.querySelectorAll(".net-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.network === network);
      });
    }

    async function loadPlans(network) {
      currentNetwork = network;
      setActiveNetworkButtons(network);
      setStatus(`Loading ${network.toUpperCase()} plans...`, "info");
      planSelect.innerHTML = `<option value="">Loading...</option>`;
      plansList.innerHTML = "";

      try {
        const token = getToken();
        if (!token) {
          setStatus("You are not logged in. Please log in first.", "error");
          planSelect.innerHTML = `<option value="">Login required</option>`;
          return;
        }

        const serviceID = getServiceID(network);

        const res = await fetch(
          `${API_BASE}/data/plans?network=${encodeURIComponent(network)}&serviceID=${encodeURIComponent(serviceID)}`,
          {
            headers: {
              "Authorization": `Bearer ${token}`
            }
          }
        );

        const data = await res.json();

        if (res.status === 401) {
          setStatus("Session expired. Please log in again.", "error");
          planSelect.innerHTML = `<option value="">Unauthorized</option>`;
          return;
        }

        const plans = Array.isArray(data?.plans) ? data.plans : [];

        if (!plans.length) {
          setStatus(`${network.toUpperCase()} plans loaded`, "info");
          planSelect.innerHTML = `<option value="">No plans found</option>`;
          plansList.innerHTML = `<div class="empty">No plans available for this network.</div>`;
          return;
        }

        setStatus(`${network.toUpperCase()} plans loaded`, "success");
        planSelect.innerHTML = "";

        plans.forEach(plan => {
          const option = document.createElement("option");
          option.value = String(plan.id);
          option.textContent = `${plan.name} — ${formatNaira(plan.pricing?.finalPrice)}`;
          option.dataset.rawPrice = String(plan.rawPrice ?? "");
          option.dataset.planName = String(plan.name ?? "");
          planSelect.appendChild(option);
        });

        plansList.innerHTML = "";
        plans.slice(0, 12).forEach(plan => {
          const card = document.createElement("div");
          card.className = "plan-card";
          card.innerHTML = `
            <div class="plan-name">${plan.name || "Data Plan"}</div>
            <div class="plan-price">${formatNaira(plan.pricing?.finalPrice)}</div>
            <div class="small">Plan ID: ${plan.id || "N/A"}</div>
          `;
          plansList.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        setStatus("Error loading plans", "error");
        planSelect.innerHTML = `<option value="">Error loading plans</option>`;
        plansList.innerHTML = `<div class="empty">Unable to load plans right now.</div>`;
      }
    }

    async function buyData() {
      const token = getToken();
      const user = getUser();
      const phone = document.getElementById("phone").value.trim();
      const variation_code = String(planSelect.value || "").trim();
      const selectedOption = planSelect.selectedOptions[0];
      const plan_name = selectedOption?.dataset.planName || "";
      const plan_amount = selectedOption?.dataset.rawPrice || "";
      const serviceID = getServiceID(currentNetwork);

      if (!token) {
        setStatus("You are not logged in. Please log in first.", "error");
        return;
      }

      if (!phone) {
        setStatus("Please enter phone number", "error");
        return;
      }

      if (!variation_code) {
        setStatus("Please select a plan", "error");
        return;
      }

      setStatus("Processing purchase...", "info");

      try {
        const res = await fetch(`${API_BASE}/data`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            network: currentNetwork,
            serviceID,
            variation_code,
            plan_amount,
            plan_name,
            phone
          })
        });

        const data = await res.json();

        if (res.ok) {
          setStatus(data.message || "Purchase successful", "success");
        } else {
          setStatus(data.message || "Purchase failed", "error");
        }
      } catch (err) {
        console.error(err);
        setStatus("Transaction failed", "error");
      }
    }

    document.querySelectorAll(".net-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        loadPlans(btn.dataset.network);
      });
    });

    window.addEventListener("DOMContentLoaded", () => {
      const loggedIn = updateLoginBox();
      if (loggedIn) {
        loadPlans("mtn");
      } else {
        planSelect.innerHTML = `<option value="">Login required</option>`;
      }
    });
  </script>
</body>
</html>
