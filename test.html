<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Data</title>

  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffffff;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.form-box{
    background:#fff;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:700;
}

input,
select{
    width:100%;
    height:55px;
    border:1px solid #ddd;
    border-radius:14px;
    padding:0 15px;
    font-size:15px;
}

.network-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:10px;
}

.network-card{
    border:2px solid #eee;
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.network-card img{
    width:40px;
    height:40px;
}

.network-card.active{
    border-color:#D4AF37;
    background:#FFF9E6;
}

.buy-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:15px;
    margin-top:25px;
    background:#D4AF37;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}



/* MODAL */

.transaction-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.transaction-card{
    width:95%;
    max-width:430px;
    background:white;
    border-radius:25px;
    padding:25px;
}

.transaction-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    background:#FFF8E1;
}

.transaction-card h2{
    text-align:center;
    margin-top:15px;
}

.transaction-card p{
    text-align:center;
    color:#666;
    margin-top:10px;
}

.receipt-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.close-btn{
    width:100%;
    height:50px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#D4AF37;
    color:white;
    font-weight:700;
}
h1{
    color:black;
    display: flex;
    justify-content:center;
    margin-bottom:100px;
}
  </style>
</head>

<body>
<!-- HEADER -->
<h1>Buy Data</h1>
<div class="container">

    <div class="form-box">

        <label>Phone Number</label>

        <input
            type="tel"
            id="phone"
maxlength="11"
    pattern="0[0-9]{10}"
            placeholder="08012345678"
        >

        <label>Choose Network</label>

        <div class="network-grid">

            <div class="network-card active"
                 data-network="mtn">

                <img
                    src="https://i.postimg.cc/pLyM40v4/idt-V6xz5Md-logos.jpg"
                    alt="MTN"
                >

            </div>

            <div class="network-card"
                 data-network="glo">

                <img
                    src="https://i.postimg.cc/B64Y96DS/glo.png"
                    alt="GLO"
                >

            </div>

            <div class="network-card"
                 data-network="airtel">

                <img
                    src="https://i.postimg.cc/FKZbSxf8/airtel.png"
                    alt="Airtel"
                >

            </div>

            <div class="network-card"
                 data-network="9mobile">

                <img
                    src="https://i.postimg.cc/hhWQ6Jz3/9mobile.png"
                    alt="9mobile"
                >

            </div>

        </div>

        <label>Select Plan</label>

        <select id="planSelect">

            <option>
                Loading Plans...
            </option>

        </select>

        <button
            id="buyBtn"
            class="buy-btn">

            Buy Data

        </button>

    </div>

</div>



<!-- TRANSACTION MODAL -->

<div
    id="transactionModal"
    class="transaction-modal">

    <div class="transaction-card">

        <div
            id="transactionIcon"
            class="transaction-icon">

            ⏳

        </div>

        <h2 id="transactionTitle">

            Processing Transaction

        </h2>

        <p id="transactionMessage">

            Please wait...

        </p>

        <div
            id="receiptSection"
            style="display:none;">

            <div class="receipt-row">
                <span>Reference</span>
                <span id="receiptReference"></span>
            </div>
<div class="receipt-row">
    <span>Amount</span>
    <span id="receiptAmount"></span>
</div>
            <div class="receipt-row">
                <span>Description</span>
                <span id="receiptDescription"></span>
            </div>

            <div class="receipt-row">
                <span>Phone</span>
                <span id="receiptPhone"></span>
            </div>

            <div class="receipt-row">
                <span>Status</span>
                <span id="receiptStatus"></span>
            </div>

            <div class="receipt-row">
                <span>Date</span>
                <span id="receiptDate"></span>
            </div>

        </div>

        <button
            onclick="closeModal()"
            class="close-btn">

            Close

        </button>

    </div>

</div>
  <script>
    /* ===========================
   API ENDPOINTS
=========================== */

/* ==========================================
   FUNSUB DATA PURCHASE JS
========================================== */

const BASE_URL =
"https://funsub.onrender.com/api/services/data/plans";

const BUY_URL =
"https://funsub.onrender.com/api/services/data";

let currentNetwork = "mtn";


/* ==========================================
   TOKEN
========================================== */

function getToken() {
    return localStorage.getItem("funsub_token") || "";
}


/* ==========================================
   NETWORK SERVICE IDS
========================================== */

function getServiceID(network) {

    const map = {
        mtn: "mtn-data",
        glo: "glo-data",
        airtel: "airtel-data",
        "9mobile": "etisalat-data"
    };

    return map[network] || "";
}


/* ==========================================
   NETWORK SELECTION
========================================== */

document
.querySelectorAll(".network-card")
.forEach(card => {

    card.addEventListener("click", () => {

        document
        .querySelectorAll(".network-card")
        .forEach(c => c.classList.remove("active"));

        card.classList.add("active");

        currentNetwork =
        card.dataset.network;

        loadPlans(currentNetwork);

    });

});


/* ==========================================
   LOAD PLANS
========================================== */

async function loadPlans(network) {

    const token = getToken();

    const planSelect =
    document.getElementById("planSelect");

    planSelect.innerHTML =
    "<option>Loading Plans...</option>";

    try {

        const serviceID =
        getServiceID(network);

        const response =
        await fetch(
            `${BASE_URL}?network=${network}&serviceID=${serviceID}`,
            {
                headers: {
                    Authorization:
                    `Bearer ${token}`
                }
            }
        );

        const data =
        await response.json();

        console.log(
            "PLANS RESPONSE:",
            data
        );

        planSelect.innerHTML = "";

        const plans =
        data.plans || [];

        if (!plans.length) {

            planSelect.innerHTML =
            "<option>No Plans Found</option>";

            return;
        }

        plans.forEach(plan => {

            const option =
            document.createElement("option");

            option.value =
            plan.id;

            option.textContent =
            `${plan.name} - ₦${Number(
                plan.pricing?.finalPrice ||
                plan.rawPrice
            ).toLocaleString()}`;

            option.dataset.planName =
            plan.name;

            option.dataset.rawPrice =
            plan.rawPrice;

            planSelect.appendChild(
                option
            );

        });

    }

    catch (error) {

        console.error(error);

        planSelect.innerHTML =
        "<option>Error Loading Plans</option>";

    }

}


/* ==========================================
   MODAL HELPERS
========================================== */

function showProcessingModal() {

    document
    .getElementById(
        "transactionModal"
    ).style.display = "flex";

    document
    .getElementById(
        "receiptSection"
    ).style.display = "none";

    document
    .getElementById(
        "transactionIcon"
    ).innerHTML = "⏳";

    document
    .getElementById(
        "transactionTitle"
    ).innerText =
    "Processing Transaction";

    document
    .getElementById(
        "transactionMessage"
    ).innerText =
    "Please wait...";
}


function closeModal() {

    document
    .getElementById(
        "transactionModal"
    ).style.display = "none";

}


/* ==========================================
   BUY DATA
========================================== */

async function buyData() {

    const token =
    getToken();

    if (!token) {

        alert(
            "Please login first"
        );

        return;
    }

    const phone =
    document
    .getElementById("phone")
    .value
    .trim();

    if (!phone) {

        alert(
            "Enter phone number"
        );

        return;
    }

    const selectedPlan =
    document
    .getElementById(
        "planSelect"
    )
    .selectedOptions[0];

    if (!selectedPlan) {

        alert(
            "Select a plan"
        );

        return;
    }

    const variation_code =
    selectedPlan.value;

    const plan_name =
    selectedPlan.dataset.planName;

    const plan_amount =
    selectedPlan.dataset.rawPrice;

    const serviceID =
    getServiceID(
        currentNetwork
    );

    showProcessingModal();

    try {

        const response =
        await fetch(
            BUY_URL,
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json",

                    Authorization:
                    `Bearer ${token}`
                },

                body: JSON.stringify({

                    network:
                    currentNetwork,

                    serviceID,

                    variation_code,

                    plan_amount,

                    plan_name,

                    phone

                })

            }
        );

        const data =
        await response.json();

        console.log(
            "PURCHASE RESPONSE:",
            data
        );


        /* ==========================
           SUCCESS
        ========================== */

        if (
            response.ok &&
            data.transaction
        ) {

            const tx =
            data.providerResponse
            ?.content
            ?.transactions || {};

            document
            .getElementById(
                "transactionIcon"
            )
            .innerHTML = "✅";

            document
            .getElementById(
                "transactionTitle"
            )
            .innerText =
            "Transaction Successful";
document
.getElementById("receiptAmount")
.innerText =
"₦" +
Number(
    data.transaction.amount
).toLocaleString();
            document
            .getElementById(
                "transactionMessage"
            )
            .innerText =
            data.message ||
            "Transaction Successful";

            document
            .getElementById(
                "receiptSection"
            )
            .style.display =
            "block";

            document
            .getElementById(
                "receiptReference"
            )
            .innerText =
            data.transaction
            .reference || "";

            document
            .getElementById(
                "receiptDescription"
            )
            .innerText =
            data.transaction
            .description || "";

            document
            .getElementById(
                "receiptPhone"
            )
            .innerText =
            tx.unique_element ||
            phone;

            document
            .getElementById(
                "receiptStatus"
            )
            .innerText =
            tx.status ||
            "success";

            document
            .getElementById(
                "receiptDate"
            )
            .innerText =
            new Date(
                data.transaction
                .created_at
            )
            .toLocaleString();

            return;
        }


        /* ==========================
           PENDING
        ========================== */

        if (
            data.status ===
            "pending"
        ) {

            document
            .getElementById(
                "transactionIcon"
            )
            .innerHTML = "🟡";

            document
            .getElementById(
                "transactionTitle"
            )
            .innerText =
            "Transaction Pending";

            document
            .getElementById(
                "transactionMessage"
            )
            .innerText =
            data.message ||
            "Transaction Pending";

            return;
        }


        /* ==========================
           FAILED
        ========================== */

        document
        .getElementById(
            "transactionIcon"
        )
        .innerHTML = "❌";

        document
        .getElementById(
            "transactionTitle"
        )
        .innerText =
        "Transaction Failed";

        document
        .getElementById(
            "transactionMessage"
        )
        .innerText =
        data.message ||
        "Transaction Failed";

    }

    catch (error) {

        console.error(error);

        document
        .getElementById(
            "transactionIcon"
        )
        .innerHTML = "❌";

        document
        .getElementById(
            "transactionTitle"
        )
        .innerText =
        "Transaction Failed";

        document
        .getElementById(
            "transactionMessage"
        )
        .innerText =
        "Unable to complete transaction";

    }

}


/* ==========================================
   BUTTON CLICK
========================================== */

document
.getElementById("buyBtn")
.addEventListener(
    "click",
    buyData
);


/* ==========================================
   INITIAL LOAD
========================================== */

window.addEventListener(
    "DOMContentLoaded",
    () => {

        loadPlans(
            "mtn"
        );

    }
);
  </script>
</body>
</html>
