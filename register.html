<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    :root{
      --bg:#0b0f16;
      --text:#f5f7fb;
      --border:rgba(255,255,255,.7);
      --field-bg:rgba(255,255,255,.02);
      --blue:#173dad;
      --blue-dark:#12359a;
      --link:#163a9f;
      --icon:#48616d;
      --success:#1fb46c;
      --danger:#e24d4d;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page{
      min-height:100vh;
      max-width:430px;
      margin:0 auto;
      padding:18px 22px 26px;
      display:flex;
      flex-direction:column;
    }

    .back{
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      text-decoration:none;
      font-size:34px;
      line-height:1;
      margin-top:2px;
      margin-left:-4px;
    }

    h1{
      margin:44px 0 0;
      font-size:34px;
      line-height:1;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .form{
      margin-top:78px;
    }

    .group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:18px;
      color:#eef1f6;
      font-weight:500;
    }

    .field{
      height:62px;
      border:2px solid var(--border);
      border-radius:14px;
      background:var(--field-bg);
      display:flex;
      align-items:center;
      padding:0 16px;
      gap:14px;
      position:relative;
    }

    .icon{
      width:24px;
      height:24px;
      flex:0 0 24px;
      color:var(--icon);
      display:grid;
      place-items:center;
    }

    .icon svg{
      width:24px;
      height:24px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    input, select{
      flex:1;
      height:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:18px;
    }

    input::placeholder{
      color:#7d8797;
      opacity:1;
    }

    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      cursor:pointer;
      padding-right:26px;
    }

    select option{
      background:#0b0f16;
      color:#fff;
    }

    .arrow{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--link);
      font-size:18px;
      font-weight:700;
      pointer-events:none;
    }

    .password-wrap{
      padding-right:52px;
    }

    .eye-btn{
      border:0;
      background:transparent;
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      padding:0;
      margin:0;
      width:24px;
      height:24px;
      color:var(--icon);
      display:grid;
      place-items:center;
      cursor:pointer;
    }

    .eye-btn svg{
      width:24px;
      height:24px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .eye-hidden{
      display:none;
    }

    .agreement{
      margin:4px 0 0;
      font-size:15px;
      line-height:1.5;
      color:#d6d9e2;
    }

    .agreement a{
      color:var(--link);
      text-decoration:none;
    }

    .spacer{
      flex:1;
      min-height:110px;
    }

    .btn{
      width:100%;
      height:74px;
      border:0;
      border-radius:14px;
      background:linear-gradient(180deg, goldenrod, goldenrod);
      color:#fff;
      font-size:22px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(27,67,181,.18);
      cursor:pointer;
      margin-top:38px;
    }

    .bottom{
      text-align:center;
      margin-top:30px;
      font-size:18px;
      color:#f4f6fb;
    }

    .bottom a{
      color:var(--link);
      text-decoration:none;
      font-weight:500;
    }

    .loader-overlay{
      position:fixed;
      inset:0;
      background:rgba(11,15,22,.72);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9998;
      backdrop-filter: blur(2px);
    }

    .loader-overlay.show{
      display:flex;
    }

    .spinner{
      width:56px;
      height:56px;
      border-radius:50%;
      border:6px solid rgba(255,255,255,.18);
      border-top-color:#ffffff;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) translateY(30px);
      opacity:0;
      visibility:hidden;
      min-width:280px;
      max-width:90vw;
      background:rgba(18,21,32,.96);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      z-index:10000;
      display:flex;
      align-items:center;
      gap:14px;
      transition:opacity .45s ease, transform .45s ease, visibility .45s ease;
    }

    .toast.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    .toast-icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:rgba(31,180,108,.16);
      display:grid;
      place-items:center;
      flex:0 0 34px;
    }

    .toast-icon svg{
      width:20px;
      height:20px;
      stroke:var(--success);
      fill:none;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .toast-text{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .toast-text strong{
      font-size:16px;
      color:#fff;
    }

    .toast-text span{
      font-size:14px;
      color:#cfd5df;
    }

    @media (max-width:380px){
      h1{font-size:31px}
      label,.bottom{font-size:15px}
      input,select{font-size:16px}
      .btn{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </div>
    <div class="toast-text">
      <strong id="toastTitle">Success</strong>
      <span id="toastMessage">Registration successful</span>
    </div>
  </div>

  <main class="page">
    <a href="javascript:history.back()" class="back" aria-label="Back">←</a>

    <h1>SignUp</h1>

    <form class="form" id="registerForm">
      <div class="group">
        <label for="fullName">Full Name</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="7.5" r="3.5"></circle>
              <path d="M5 20c1.4-4 4.1-6 7-6s5.6 2 7 6"></path>
            </svg>
          </span>
          <input id="fullName" type="text" placeholder="enter your legal full name" required />
        </div>
      </div>

      <div class="group">
        <label for="phone">Phone Number</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 4h3l2 5-2 2c1.4 2.7 3.4 4.7 6 6l2-2 5 2v3c0 1.1-.9 2-2 2C10.4 22 2 13.6 2 3c0-1.1.9-2 2-2h1"></path>
            </svg>
          </span>
          <input id="phone" type="tel" placeholder="enter your phone number" required />
        </div>
      </div>

      <div class="group">
        <label for="email">Email</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M4 7l8 6 8-6"></path>
            </svg>
          </span>
          <input id="email" type="email" placeholder="enter your email" required />
        </div>
      </div>

      <div class="group">
        <label for="password">Password</label>
        <div class="field password-wrap">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            </svg>
          </span>
          <input id="password" type="password" placeholder="create password" required />
          <button type="button" class="eye-btn" data-target="password" aria-label="Show password">
            <svg viewBox="0 0 24 24" class="eye-open">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-hidden">
              <path d="M3 3l18 18"></path>
              <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3"></path>
              <path d="M6.2 6.2C4.3 7.6 3 9.7 2 12c1.5 3.5 5.2 7 10 7 1.6 0 3.1-.3 4.4-.8"></path>
              <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-4.1 5.3"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="field password-wrap">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            </svg>
          </span>
          <input id="confirmPassword" type="password" placeholder="confirm password" required />
          <button type="button" class="eye-btn" data-target="confirmPassword" aria-label="Show confirm password">
            <svg viewBox="0 0 24 24" class="eye-open">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-hidden">
              <path d="M3 3l18 18"></path>
              <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3"></path>
              <path d="M6.2 6.2C4.3 7.6 3 9.7 2 12c1.5 3.5 5.2 7 10 7 1.6 0 3.1-.3 4.4-.8"></path>
              <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-4.1 5.3"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="group">
        <label for="state">State</label>
        <div class="field">
          <select id="state" required>
            <option selected disabled value="">Select State</option>
            <option>Abia</option>
            <option>Adamawa</option>
            <option>Akwa Ibom</option>
            <option>Anambra</option>
            <option>Bauchi</option>
            <option>Bayelsa</option>
            <option>Benue</option>
            <option>Borno</option>
            <option>Cross River</option>
            <option>Delta</option>
            <option>Ebonyi</option>
            <option>Edo</option>
            <option>Ekiti</option>
            <option>Enugu</option>
            <option>FCT</option>
            <option>Gombe</option>
            <option>Imo</option>
            <option>Jigawa</option>
            <option>Kaduna</option>
            <option>Kano</option>
            <option>Katsina</option>
            <option>Kebbi</option>
            <option>Kogi</option>
            <option>Kwara</option>
            <option>Lagos</option>
            <option>Nasarawa</option>
            <option>Niger</option>
            <option>Ogun</option>
            <option>Ondo</option>
            <option>Osun</option>
            <option>Oyo</option>
            <option>Plateau</option>
            <option>Rivers</option>
            <option>Sokoto</option>
            <option>Taraba</option>
            <option>Yobe</option>
            <option>Zamfara</option>
          </select>
          <span class="arrow">⌄</span>
        </div>
      </div>

      <p class="agreement">
        By registering you agree to FunSub
        <a href="#">Privacy Policy</a> and
        <a href="#">Terms and conditions</a>
      </p>

      <div class="spacer"></div>

      <button class="btn" type="submit">Continue</button>

      <div class="bottom">
        I have an existing account<a href="login.html">Login</a>
      </div>
    </form>
  </main>

  <script>
    const registerForm = document.getElementById('registerForm');
    const loader = document.getElementById('loader');
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toastTitle');
    const toastMessage = document.getElementById('toastMessage');

    const storageKey = 'sub2me_user';
    const loggedKey = 'sub2me_logged_in';
    const tokenKey = 'sub2me_token';
    const walletKey = 'sub2me_wallet';

    // Set this if your frontend is on a different domain.
    const API_BASE_URL = localStorage.getItem('apiBaseUrl') || '';

    function showLoader() {
      loader.classList.add('show');
    }

    function hideLoader() {
      loader.classList.remove('show');
    }

    function showToast(title, message, type = 'success') {
      toastTitle.textContent = title;
      toastMessage.textContent = message;

      const iconCircle = toast.querySelector('.toast-icon');
      const iconPath = toast.querySelector('.toast-icon path');

      if (type === 'error') {
        iconCircle.style.background = 'rgba(226,77,77,.16)';
        iconPath.setAttribute('d', 'M6 6l12 12M18 6L6 18');
        iconPath.style.stroke = 'var(--danger)';
      } else {
        iconCircle.style.background = 'rgba(31,180,108,.16)';
        iconPath.setAttribute('d', 'M20 6L9 17l-5-5');
        iconPath.style.stroke = 'var(--success)';
      }

      toast.classList.add('show');
    }

    function hideToast() {
      toast.classList.remove('show');
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    function normalizePhone(value) {
      return value.replace(/\D/g, '');
    }

    document.querySelectorAll('.eye-btn').forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.getAttribute('data-target');
        const input = document.getElementById(targetId);

        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';

        button.setAttribute(
          'aria-label',
          isPassword ? 'Hide password' : 'Show password'
        );

        button.querySelector('.eye-open').style.display = isPassword ? 'none' : 'block';
        button.querySelector('.eye-hidden').style.display = isPassword ? 'block' : 'none';
      });
    });

    registerForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const state = document.getElementById('state').value;

      if (!fullName || !phone || !email || !password || !confirmPassword || !state) {
        showToast('Error', 'Please fill in all fields.', 'error');
        setTimeout(hideToast, 2200);
        return;
      }

      if (password !== confirmPassword) {
        showToast('Error', 'Passwords do not match.', 'error');
        setTimeout(hideToast, 2200);
        return;
      }

      showLoader();

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fullName,
            phone,
            email,
            password,
            confirmPassword,
            state
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok) {
          hideLoader();
          showToast('Error', data?.message || 'Registration failed', 'error');
          setTimeout(hideToast, 2500);
          return;
        }

        localStorage.setItem(loggedKey, 'false');
        localStorage.setItem(tokenKey, data.token || '');
        localStorage.setItem(storageKey, JSON.stringify(data.user || {}));
        localStorage.setItem(walletKey, JSON.stringify(data.wallet || {}));

        hideLoader();
        showToast('Success', data.message || 'Registration successful');

        setTimeout(() => {
          hideToast();
          window.location.href = 'login.html';
        }, 1800);
      } catch (err) {
        hideLoader();
        showToast('Error', 'Unable to reach the server', 'error');
        setTimeout(hideToast, 2500);
      }
    });
  </script>
</body>
</html>
