<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    :root{
      --bg:#0b0f16;
      --text:#f5f7fb;
      --border:rgba(255,255,255,.7);
      --field-bg:rgba(255,255,255,.02);
      --blue:#173dad;
      --blue-dark:#12359a;
      --link:#163a9f;
      --icon:#48616d;
      --success:#1fb46c;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page{
      min-height:100vh;
      max-width:430px;
      margin:0 auto;
      padding:18px 22px 26px;
      display:flex;
      flex-direction:column;
    }

    .back{
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      text-decoration:none;
      font-size:34px;
      line-height:1;
      margin-top:2px;
      margin-left:-4px;
    }

    h1{
      margin:44px 0 0;
      font-size:34px;
      line-height:1;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .form{
      margin-top:78px;
    }

    .group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:18px;
      color:#eef1f6;
      font-weight:500;
    }

    .field{
      height:62px;
      border:2px solid var(--border);
      border-radius:14px;
      background:var(--field-bg);
      display:flex;
      align-items:center;
      padding:0 16px;
      gap:14px;
      position:relative;
    }

    .icon{
      width:24px;
      height:24px;
      flex:0 0 24px;
      color:var(--icon);
      display:grid;
      place-items:center;
    }

    .icon svg{
      width:24px;
      height:24px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    input, select{
      flex:1;
      height:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:18px;
    }

    input::placeholder{
      color:#7d8797;
      opacity:1;
    }

    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      cursor:pointer;
      padding-right:26px;
    }

    select option{
      background:#0b0f16;
      color:#fff;
    }

    .arrow{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--link);
      font-size:18px;
      font-weight:700;
      pointer-events:none;
    }

    .agreement{
      margin:4px 0 0;
      font-size:15px;
      line-height:1.5;
      color:#d6d9e2;
    }

    .agreement a{
      color:var(--link);
      text-decoration:none;
    }

    .spacer{
      flex:1;
      min-height:110px;
    }

    .btn{
      width:100%;
      height:74px;
      border:0;
      border-radius:14px;
      background:linear-gradient(180deg, var(--blue), var(--blue-dark));
      color:#fff;
      font-size:22px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(27,67,181,.18);
      cursor:pointer;
      margin-top:38px;
    }

    .bottom{
      text-align:center;
      margin-top:30px;
      font-size:18px;
      color:#f4f6fb;
    }

    .bottom a{
      color:var(--link);
      text-decoration:none;
      font-weight:500;
    }

    .loader-overlay{
      position:fixed;
      inset:0;
      background:rgba(11,15,22,.72);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9998;
      backdrop-filter: blur(2px);
    }

    .loader-overlay.show{
      display:flex;
    }

    .spinner{
      width:56px;
      height:56px;
      border-radius:50%;
      border:6px solid rgba(255,255,255,.18);
      border-top-color:#ffffff;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) translateY(30px);
      opacity:0;
      visibility:hidden;
      min-width:280px;
      max-width:90vw;
      background:rgba(18,21,32,.96);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      z-index:10000;
      display:flex;
      align-items:center;
      gap:14px;
      transition:opacity .45s ease, transform .45s ease, visibility .45s ease;
    }

    .toast.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    .toast-icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:rgba(31,180,108,.16);
      display:grid;
      place-items:center;
      flex:0 0 34px;
    }

    .toast-icon svg{
      width:20px;
      height:20px;
      stroke:var(--success);
      fill:none;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .toast-text{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .toast-text strong{
      font-size:16px;
      color:#fff;
    }

    .toast-text span{
      font-size:14px;
      color:#cfd5df;
    }

    @media (max-width:380px){
      h1{font-size:31px}
      label,.bottom{font-size:15px}
      input,select{font-size:16px}
      .btn{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </div>
    <div class="toast-text">
      <strong id="toastTitle">Success</strong>
      <span id="toastMessage">Registration successful</span>
    </div>
  </div>

  <main class="page">
    <a href="javascript:history.back()" class="back" aria-label="Back">←</a>

    <h1>SignUp</h1>

    <form class="form" id="registerForm">
      <div class="group">
        <label for="fullName">Full Name</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="7.5" r="3.5"></circle>
              <path d="M5 20c1.4-4 4.1-6 7-6s5.6 2 7 6"></path>
            </svg>
          </span>
          <input id="fullName" type="text" placeholder="enter your legal full name" required />
        </div>
      </div>

      <div class="group">
        <label for="phone">Phone Number</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 4h3l2 5-2 2c1.4 2.7 3.4 4.7 6 6l2-2 5 2v3c0 1.1-.9 2-2 2C10.4 22 2 13.6 2 3c0-1.1.9-2 2-2h1"></path>
            </svg>
          </span>
          <input id="phone" type="tel" placeholder="enter your phone number" required />
        </div>
      </div>

      <div class="group">
        <label for="email">Email</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M4 7l8 6 8-6"></path>
            </svg>
          </span>
          <input id="email" type="email" placeholder="enter your email" required />
        </div>
      </div>

      <div class="group">
        <label for="state">State</label>
        <div class="field">
          <select id="state" required>
            <option selected disabled value="">Select State</option>
            <option>Abia</option>
            <option>Adamawa</option>
            <option>Akwa Ibom</option>
            <option>Anambra</option>
            <option>Bauchi</option>
            <option>Bayelsa</option>
            <option>Benue</option>
            <option>Borno</option>
            <option>Cross River</option>
            <option>Delta</option>
            <option>Ebonyi</option>
            <option>Edo</option>
            <option>Ekiti</option>
            <option>Enugu</option>
            <option>FCT</option>
            <option>Gombe</option>
            <option>Imo</option>
            <option>Jigawa</option>
            <option>Kaduna</option>
            <option>Kano</option>
            <option>Katsina</option>
            <option>Kebbi</option>
            <option>Kogi</option>
            <option>Kwara</option>
            <option>Lagos</option>
            <option>Nasarawa</option>
            <option>Niger</option>
            <option>Ogun</option>
            <option>Ondo</option>
            <option>Osun</option>
            <option>Oyo</option>
            <option>Plateau</option>
            <option>Rivers</option>
            <option>Sokoto</option>
            <option>Taraba</option>
            <option>Yobe</option>
            <option>Zamfara</option>
          </select>
          <span class="arrow">⌄</span>
        </div>
      </div>

      <p class="agreement">
        By registering you agree to FubSub
        <a href="#">Privacy Policy</a> and
        <a href="#">Terms and conditions</a>
      </p>

      <div class="spacer"></div>

      <button class="btn" type="submit">Continue</button>

      <div class="bottom">
        I have an existing account<a href="login.html">Login</a>
      </div>
    </form>
  </main>

  <script>
    const registerForm = document.getElementById('registerForm');
    const loader = document.getElementById('loader');
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toastTitle');
    const toastMessage = document.getElementById('toastMessage');

    const storageKey = 'sub2me_user';
    const loggedKey = 'sub2me_logged_in';

    function showLoader() {
      loader.classList.add('show');
    }

    function hideLoader() {
      loader.classList.remove('show');
    }

    function showToast(title, message) {
      toastTitle.textContent = title;
      toastMessage.textContent = message;
      toast.classList.add('show');
    }

    function hideToast() {
      toast.classList.remove('show');
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    function normalizePhone(value) {
      return value.replace(/\D/g, '');
    }

    registerForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const state = document.getElementById('state').value;

      if (!fullName || !phone || !email || !state) {
        return;
      }

      const newUser = {
        fullName,
        phone,
        phoneDigits: normalizePhone(phone),
        email: normalizeEmail(email),
        state,
        createdAt: new Date().toISOString()
      };

      localStorage.setItem(storageKey, JSON.stringify(newUser));
      localStorage.removeItem(loggedKey);

      showLoader();

      setTimeout(() => {
        hideLoader();
        showToast('Success', 'Registration successful');
      }, 1000);

      setTimeout(() => {
        hideToast();
        window.location.href = 'login.html';
      }, 3000);
    });
  </script>
</body>
</html>
