<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#d4b35f">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
 <style>
    :root{
      /* LIGHT MODE */
      --bg:#f7f7f7;
      --text:#111111;
      --border:#d1d5db;
      --field-bg:#ffffff;
      --blue:#173dad;
      --blue-dark:#12359a;
      --link:#163a9f;
      --icon:#48616d;
      --success:#1fb46c;
    }

    body.dark{
      /* DARK MODE */
      --bg:#0b0f16;
      --text:#f5f7fb;
      --border:rgba(255,255,255,.7);
      --field-bg:rgba(255,255,255,.02);
      --blue:#173dad;
      --blue-dark:#12359a;
      --link:#7ea2ff;
      --icon:#8fa6b3;
      --success:#1fb46c;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page{
      min-height:100vh;
      max-width:430px;
      margin:0 auto;
      padding:18px 22px 26px;
      display:flex;
      flex-direction:column;
    }

    .back{
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      text-decoration:none;
      font-size:34px;
      line-height:1;
      margin-top:2px;
      margin-left:-4px;
    }

    h1{
      margin:44px 0 0;
      font-size:34px;
      line-height:1;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .form{
      margin-top:78px;
    }

    .group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:18px;
      color:var(--text);
      font-weight:500;
    }

    .field{
      height:62px;
      border:2px solid var(--border);
      border-radius:14px;
      background:var(--field-bg);
      display:flex;
      align-items:center;
      padding:0 16px;
      gap:14px;
    }

    .icon{
      width:24px;
      height:24px;
      flex:0 0 24px;
      color:var(--icon);
      display:grid;
      place-items:center;
    }

    .icon svg,
    .eye-btn svg{
      width:24px;
      height:24px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    input{
      flex:1;
      height:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:18px;
    }

    input::placeholder{
      color:#7d8797;
      opacity:1;
    }

    .password{
      position:relative;
    }

    .eye-btn{
      border:0;
      background:transparent;
      padding:0;
      margin:0;
      width:24px;
      height:24px;
      color:var(--icon);
      display:grid;
      place-items:center;
      cursor:pointer;
      flex:0 0 24px;
    }

    .eye-hidden{
      display:none;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-top:6px;
      font-size:16px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--text);
      white-space:nowrap;
    }

    .remember input{
      width:20px;
      height:20px;
      accent-color:var(--blue);
      flex:none;
    }

    .forgot{
      color:var(--link);
      text-decoration:none;
      white-space:nowrap;
    }

    .spacer{
      flex:1;
      min-height:110px;
    }

    .btn{
      width:100%;
      height:74px;
      border:0;
      border-radius:14px;
      background:linear-gradient(180deg,goldenrod,goldenrod);
      color:#fff;
      font-size:22px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(27,67,181,.18);
      cursor:pointer;
    }

    .bottom{
      text-align:center;
      margin-top:30px;
      font-size:18px;
      color:var(--text);
    }

    .bottom a{
      color:var(--link);
      text-decoration:none;
      font-weight:500;
    }

    .loader-overlay{
      position:fixed;
      inset:0;
      background:rgba(11,15,22,.72);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9998;
      backdrop-filter:blur(2px);
    }

    .loader-overlay.show{
      display:flex;
    }

    .spinner{
      width:56px;
      height:56px;
      border-radius:50%;
      border:6px solid rgba(255,255,255,.18);
      border-top-color:#ffffff;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg)
      }
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) translateY(30px);
      opacity:0;
      visibility:hidden;
      min-width:280px;
      max-width:90vw;
      background:#ffffff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:0 18px 40px rgba(0,0,0,.15);
      z-index:10000;
      display:flex;
      align-items:center;
      gap:14px;
      transition:opacity .45s ease, transform .45s ease, visibility .45s ease;
    }

    .toast.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    .toast-icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:rgba(31,180,108,.16);
      display:grid;
      place-items:center;
      flex:0 0 34px;
    }

    .toast-icon svg{
      width:20px;
      height:20px;
      stroke:var(--success);
      fill:none;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .toast-text{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .toast-text strong{
      font-size:16px;
      color:var(--text);
    }

    .toast-text span{
      font-size:14px;
      color:var(--text);
      opacity:.8;
    }

    body.dark .toast{
      background:#1a1d24;
      border:1px solid rgba(255,255,255,.08);
    }

    body.dark .field{
      border-color:rgba(255,255,255,.25);
    }

    body.dark input::placeholder{
      color:#8a93a3;
    }

    @media (max-width:380px){
      h1{font-size:31px}
      label,.row,.bottom{font-size:15px}
      input{font-size:16px}
      .btn{font-size:20px}
    }
</style>
</head>
<body>
  <div class="loader-overlay" id="loader">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </div>
    <div class="toast-text">
      <strong id="toastTitle">Success</strong>
      <span id="toastMessage">Login successful</span>
    </div>
  </div>

  <main class="page">
    <a href="javascript:history.back()" class="back" aria-label="Back">←</a>

    <h1>Welcome Back!</h1>

    <form class="form" id="loginForm">
      <div class="group">
        <label for="loginId">Email or Phone Number</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M4 7l8 6 8-6"></path>
            </svg>
          </span>
          <input id="loginId" type="text" placeholder="080 1234 5678" />
        </div>
      </div>

      <div class="group">
        <label for="password">Password</label>
        <div class="field password">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            </svg>
          </span>
          <input id="password" type="password" />
          <button type="button" class="eye-btn" id="togglePwd" aria-label="Show password">
            <svg viewBox="0 0 24 24" class="eye-open">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-hidden">
              <path d="M3 3l18 18"></path>
              <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3"></path>
              <path d="M6.2 6.2C4.3 7.6 3 9.7 2 12c1.5 3.5 5.2 7 10 7 1.6 0 3.1-.3 4.4-.8"></path>
              <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-4.1 5.3"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" checked />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>

      <div class="spacer"></div>

      <button class="btn" type="submit">Sign In</button>

      <div class="bottom">
        New user? <a href="register.html">Sign Up</a>
      </div>
    </form>
  </main>
<script src="theme.js" defer></script>



<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loader = document.getElementById('loader');
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toastTitle');
    const toastMessage = document.getElementById('toastMessage');
    const password = document.getElementById('password');
    const togglePwd = document.getElementById('togglePwd');
    const loginIdInput = document.getElementById('loginId');

    const storageKey = 'funsub_user';
    const loggedKey = 'funsub_logged_in';
    const rememberKey = 'funsub_remembered';
    const tokenKey = 'funsub_token';
    const walletKey = 'funsub_wallet';

    const API_BASE_URL = 'https://funsub.onrender.com';

    function showLoader() {
      loader.classList.add('show');
    }

    function hideLoader() {
      loader.classList.remove('show');
    }

    function showToast(title, message) {
      toastTitle.textContent = title;
      toastMessage.textContent = message;
      toast.classList.add('show');
    }

    function hideToast() {
      toast.classList.remove('show');
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    function normalizePhone(value) {
      return value.replace(/\D/g, '');
    }

    function getSavedUser() {
      try {
        return JSON.parse(localStorage.getItem(storageKey));
      } catch (err) {
        return null;
      }
    }

    function prefillRememberedValue() {
      const remembered = localStorage.getItem(rememberKey);
      if (remembered) {
        loginIdInput.value = remembered;
      }
    }

    prefillRememberedValue();

    togglePwd.addEventListener('click', () => {
      const isHidden = password.type === 'password';
      password.type = isHidden ? 'text' : 'password';
      togglePwd.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      togglePwd.querySelector('.eye-open').style.display = isHidden ? 'none' : 'block';
      togglePwd.querySelector('.eye-hidden').style.display = isHidden ? 'block' : 'none';
    });

    loginForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      const loginId = document.getElementById('loginId').value.trim();
      const enteredPassword = password.value.trim();

      if (!loginId || !enteredPassword) {
        showToast('Error', 'Email/phone and password are required');
        setTimeout(hideToast, 2200);
        return;
      }

      showLoader();

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            identifier: loginId,
            password: enteredPassword
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok) {
          const message = data?.message || 'Login failed';
          hideLoader();
          showToast('Error', message);
          setTimeout(hideToast, 2500);
          return;
        }

        const rememberMe = document.querySelector('.remember input').checked;

        localStorage.setItem(loggedKey, 'true');
        localStorage.setItem(tokenKey, data.token || '');
        localStorage.setItem(storageKey, JSON.stringify(data.user || {}));
        localStorage.setItem(walletKey, JSON.stringify(data.wallet || {}));

        if (rememberMe) {
          localStorage.setItem(rememberKey, loginId);
        } else {
          localStorage.removeItem(rememberKey);
        }

        hideLoader();
        showToast('Success', data.message || 'Login successful');

        setTimeout(() => {
          hideToast();
          window.location.href = 'dashboard.html';
        }, 1600);
      } catch (err) {
        hideLoader();
        showToast('Error', 'Unable to reach the server');
        setTimeout(hideToast, 2500);
      }
    });
  </script>
</body>
</html>
