<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Unavailable</title>
  <style>
    :root{
      --bg1:#0f1115;
      --bg2:#161a23;
      --card:#1b2030;
      --text:#ffffff;
      --muted:#c7cbd6;
      --accent:#d4b35f;
      --accent2:#f4d27a;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:Arial, Helvetica, sans-serif;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,179,95,.18), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(244,210,122,.14), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color:var(--text);
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      position:relative;
      width:min(92vw, 420px);
      padding:32px 24px;
      border-radius:28px;
      background:rgba(27,32,48,.78);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      backdrop-filter:blur(14px);
      text-align:center;
      overflow:hidden;
    }

    .glow{
      position:absolute;
      inset:-120px;
      background:conic-gradient(from 180deg,
        transparent 0deg,
        rgba(212,179,95,.14) 60deg,
        transparent 120deg,
        rgba(244,210,122,.12) 180deg,
        transparent 240deg,
        rgba(212,179,95,.14) 300deg,
        transparent 360deg);
      animation:spin 10s linear infinite;
      pointer-events:none;
      filter:blur(10px);
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .loader{
      width:96px;
      height:96px;
      margin:0 auto 22px;
      position:relative;
    }

    .ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.08);
    }

    .ring::before{
      content:"";
      position:absolute;
      inset:-4px;
      border-radius:50%;
      border:4px solid transparent;
      border-top-color:var(--accent);
      border-right-color:var(--accent2);
      animation:rotate 1.1s linear infinite;
      box-shadow:0 0 24px rgba(212,179,95,.18);
    }

    .dot{
      position:absolute;
      width:14px;
      height:14px;
      top:50%;
      left:50%;
      margin:-7px 0 0 -7px;
      border-radius:50%;
      background:var(--accent2);
      box-shadow:0 0 18px rgba(244,210,122,.8);
      animation:orbit 1.8s ease-in-out infinite;
    }

    @keyframes rotate{
      to{transform:rotate(360deg)}
    }

    @keyframes orbit{
      0%,100%{transform:translate(-34px,-34px) scale(1)}
      25%{transform:translate(34px,-34px) scale(.9)}
      50%{transform:translate(34px,34px) scale(1)}
      75%{transform:translate(-34px,34px) scale(.9)}
    }

    .title{
      font-size:28px;
      font-weight:800;
      letter-spacing:.4px;
      margin:0 0 10px;
    }

    .subtitle{
      font-size:15px;
      line-height:1.6;
      color:var(--muted);
      margin:0 auto 22px;
      max-width:300px;
    }

    .pulse-text{
      display:inline-block;
      font-weight:700;
      color:var(--accent2);
      animation:pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:.55; transform:scale(1)}
      50%{opacity:1; transform:scale(1.04)}
    }

    .bar{
      width:100%;
      height:12px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }

    .bar span{
      display:block;
      height:100%;
      width:40%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      animation:loading 1.8s ease-in-out infinite;
      box-shadow:0 0 20px rgba(212,179,95,.3);
    }

    @keyframes loading{
      0%{transform:translateX(-120%)}
      50%{transform:translateX(60%)}
      100%{transform:translateX(240%)}
    }

    .floating{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .floating span{
      position:absolute;
      bottom:-40px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(244,210,122,.35);
      animation:rise linear infinite;
      box-shadow:0 0 12px rgba(244,210,122,.25);
    }

    .floating span:nth-child(1){left:10%; animation-duration:10s; animation-delay:0s}
    .floating span:nth-child(2){left:25%; width:14px; height:14px; animation-duration:13s; animation-delay:2s}
    .floating span:nth-child(3){left:40%; animation-duration:9s; animation-delay:1s}
    .floating span:nth-child(4){left:60%; width:12px; height:12px; animation-duration:11s; animation-delay:3s}
    .floating span:nth-child(5){left:75%; animation-duration:12s; animation-delay:1.5s}
    .floating span:nth-child(6){left:88%; width:15px; height:15px; animation-duration:14s; animation-delay:4s}

    @keyframes rise{
      0%{
        transform:translateY(0) scale(.8);
        opacity:0;
      }
      10%{opacity:1}
      100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
      }
    }

    @media (max-width:420px){
      .title{font-size:24px}
      .subtitle{font-size:14px}
      .card{padding:28px 18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="floating">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="card">
      <div class="glow"></div>

      <div class="loader" aria-hidden="true">
        <div class="ring"></div>
        <div class="dot"></div>
      </div>

      <h1 class="title">Page Not Available</h1>
      <p class="subtitle">
        We are currently working on this page.
        <br>
        Please check back soon.
      </p>

      <div class="pulse-text">Working on it...</div>
      <div class="bar"><span></span></div>
    </div>
  </div>
</body>
</html>
